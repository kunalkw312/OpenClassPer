<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Premium SaaS LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brandBlue: '#004a80', brandOrange: '#f7941d' } } } }
    </script>
    <style>
        :root { --text-main: #fdfbf7; --bg-main: #050505; --glass-bg: rgba(15, 15, 15, 0.9); --input-bg: #111; }
        .light { --text-main: #002e50; --bg-main: #fdfbf7; --glass-bg: rgba(255, 255, 255, 0.85); --input-bg: #fff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: background-color 0.4s, color 0.4s; overflow-x: hidden; padding-bottom: 95px; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid rgba(128, 128, 128, 0.1); }
        .btn-brand { background: linear-gradient(135deg, #004a80 0%, #f7941d 100%); background-size: 200% auto; transition: 0.5s; color: white !important; font-weight: 800; text-transform: uppercase; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-brand:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 74, 128, 0.2); }
        
        /* Fixed Symmetrical Navigation Pill Architecture */
        .tab-btn { width: 100%; text-align: center; padding: 12px 0; font-weight: 800; text-transform: uppercase; font-size: 10px; border-radius: 20px; transition: 0.3s; opacity: 0.4; color: var(--text-main); border: 1px solid transparent; }
        .tab-btn.active { background: rgba(247, 148, 29, 0.15); color: #f7941d; opacity: 1; border: 1px solid rgba(247, 148, 29, 0.25); }
        
        .input-field { background: var(--input-bg); border: 1px solid rgba(128, 128, 128, 0.2); color: var(--text-main); outline: none; padding: 1rem; border-radius: 14px; width: 100%; }
        #toast-box { position: fixed; bottom: 7rem; left: 50%; transform: translateX(-50%); z-index: 99999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast-pill { background: #111; color: #fff; padding: 0.6rem 1.5rem; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: 800; text-transform: uppercase; animation: popUp 0.3s forwards; }
        
        #vault-wrapper { height: 100%; width: 100%; aspect-ratio: 16/9; max-height: 80vh; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .plyr { width: 100% !important; height: 100% !important; max-height: 80vh !important; }
        .plyr__video-wrapper { height: 100% !important; }
        #media-vault .plyr__video-embed iframe { transform: scale(1.35); pointer-events: none; top: -17%; height: 134%; }
        .plyr--full-ui.plyr--video .plyr__control--overlaid { background: #f7941d; }
        .plyr--video .plyr__controls { background: linear-gradient(transparent, rgba(0,0,0,0.9)); border-radius: 0 0 14px 14px; }
        .grid-btn-active { background: rgba(247, 148, 29, 0.2) !important; border: 1px solid rgba(247, 148, 29, 0.3) !important; color: #f7941d !important; }

        #anti-theft-blank {
            display: none;
            position: absolute;
            inset: 0;
            background: #000 !important;
            z-index: 2147483647 !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff !important;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: auto !important;
        }

        #secure-watermark {
            position: absolute;
            z-index: 2147483646 !important;
            pointer-events: none !important;
            font-weight: 800;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.15) !important;
            mix-blend-mode: difference !important;
            white-space: nowrap;
            user-select: none;
            transition: all 1.2s ease-in-out;
        }

        .plyr--fullscreen-active #anti-theft-blank { display: none; z-index: 2147483647 !important; }
        .plyr--fullscreen-active #secure-watermark { z-index: 2147483646 !important; }

        .search-container { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 40px; }
        .search-container.expanded { width: 260px; }

        #floating-bottom-nav-bar { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 4500; width: calc(100% - 2rem); max-width: 500px; transition: transform 0.3s ease, opacity 0.3s ease; }
        #floating-bottom-nav-bar.nav-hidden { transform: translate(-50(), 100px); opacity: 0; pointer-events: none; }

        @keyframes popUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-brandOrange/30">
    <div id="toast-box"></div>

    <div id="custom-modal" class="hidden fixed inset-0 z-[2500] bg-black/95 backdrop-blur-md flex items-center justify-center p-6">
        <div class="absolute top-6 left-6 text-white/50 cursor-pointer hover:text-white font-bold flex items-center gap-2 select-none" onclick="closeCustomModal()">← BACK</div>
        <div id="modal-content" class="w-full max-w-xl glass p-10 rounded-[3rem] border border-brandOrange/20 shadow-2xl overflow-y-auto max-h-[90vh]"></div>
    </div>

    <div id="media-vault" class="hidden fixed inset-0 z-[2000] bg-black flex items-center justify-center p-4">
        <button onclick="closeVault()" class="absolute top-6 right-6 bg-white/10 hover:bg-red-500 text-white w-12 h-12 rounded-full flex items-center justify-center font-black z-[2147483647]">✕</button>
        <div id="vault-capture-container" class="w-full max-w-5xl overflow-hidden rounded-2xl shadow-2xl relative flex items-center justify-center">
             <div id="vault-wrapper">
                 <div id="anti-theft-blank">⚠️ Screen Capture / Recording Warning: Active Assets Paused</div>
                 <div id="secure-watermark"></div>
                 <div id="player-container" class="w-full h-full"></div>
             </div>
        </div>
    </div>

    <div id="group-chat-window" class="hidden fixed inset-0 bg-black/95 z-[6000] flex flex-col">
        <div class="p-5 glass flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-4">
                <button class="text-white/50 hover:text-white mr-2" onclick="closeGroupChat()">← BACK</button>
                <h2 id="group-chat-title" class="text-2xl font-black italic">Group</h2>
                <button id="group-roster-btn" class="text-xs font-bold text-brandOrange uppercase border border-brandOrange/20 px-3 py-1 rounded-lg hover:bg-brandOrange/10">Manage Members</button>
            </div>
            <button onclick="closeGroupChat()" class="text-2xl">✕</button>
        </div>
        <div id="group-chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div class="p-4 flex gap-4 glass border-t border-white/5">
            <input id="group-message-input" class="input-field flex-1" placeholder="Type message safely...">
            <button onclick="sendGroupMessage()" class="btn-brand px-8">Send</button>
        </div>
    </div>

    <div id="app">
        <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] text-center shadow-2xl">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-2xl object-cover">
                <h1 class="text-4xl font-black mb-8 italic">Open<span class="text-brandOrange">Class</span></h1>
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="student">Student Account</option>
                        <option value="teacher">Teacher Account</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button onclick="handleAuth()" id="primary-auth-btn" class="w-full py-4 btn-brand">Sign In</button>
                    <button onclick="handleGoogle()" class="w-full py-4 glass dark:text-white text-[#002e50] rounded-2xl font-bold uppercase text-[10px] flex items-center justify-center gap-4 border border-zinc-500/20">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> 
                        Continue with Google
                    </button>
                    <button onclick="toggleAuth()" id="toggle-auth-btn" class="w-full text-[10px] text-zinc-500 font-bold uppercase mt-6 hover:text-brandOrange">Create Profile</button>
                </div>
            </div>
        </div>

        <div id="verify-screen" class="hidden min-h-screen flex items-center justify-center p-6 relative">
            <button onclick="showScreen('auth-screen')" class="absolute top-10 right-10 text-2xl font-black text-white/30 hover:text-white">✕</button>
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] text-center border-brandOrange/20 shadow-2xl">
                <h2 class="text-3xl font-black mb-4 italic">Verify Code</h2>
                <p id="verify-note" class="text-zinc-500 text-[10px] mb-8 uppercase font-bold"></p>
                <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-5xl font-black mb-6">
                <button onclick="checkOTP()" class="w-full py-5 btn-brand shadow-xl">Verify</button>
            </div>
        </div>

        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-4 md:p-5 glass border-b border-white/5 sticky top-0 z-[1000] flex flex-row gap-4 justify-between px-4 md:px-10 items-center">
                <div class="flex items-center gap-3 cursor-pointer select-none" onclick="navigate('home')" id="nav-branding-block">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-8 md:h-10 rounded-xl">
                    <h2 class="text-xl md:text-2xl font-black italic tracking-tighter">Open<span class="text-brandOrange">Class</span></h2>
                </div>

                <div class="flex items-center gap-3 md:gap-4 justify-end relative z-10 ml-auto">
                    <div class="search-container relative flex items-center h-10 overflow-hidden rounded-2xl bg-white/5 border border-white/10" id="search-wrapper-node">
                        <button onclick="toggleExpandableSearch(event)" class="w-10 h-10 flex items-center justify-center text-zinc-400 hover:text-white shrink-0 outline-none">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="8" cy="8" r="6" /><path d="M13 13l4 4" /></svg>
                        </button>
                        <input type="text" id="g-search" oninput="reactiveSearch(this.value)" onblur="collapseSearchOnBlur()" placeholder="Search campus..." class="bg-transparent text-sm w-full outline-none pr-4 text-zinc-900 dark:text-zinc-100 placeholder-zinc-500 hidden">
                    </div>
                    
                    <div id="nav-action-icons-row" class="flex items-center gap-3 md:gap-4">
                        <button onclick="showNotificationsHub()" class="p-2 glass rounded-xl relative text-lg outline-none">
                            🔔<span id="notify-pill" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center animate-pulse">0</span>
                        </button>
                        <button onclick="showCart()" class="p-2 glass rounded-xl relative text-lg outline-none">
                            🛒<span id="cart-pill" class="hidden absolute -top-1 -right-1 bg-brandOrange text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center">0</span>
                        </button>
                        <button onclick="toggleMode()" class="p-2 glass rounded-xl text-lg outline-none">🌓</button>
                        <div id="nav-profile-pic" onclick="showProfileSettings()" class="w-9 h-9 md:w-10 md:h-10 rounded-full border-2 overflow-hidden cursor-pointer block select-none"></div>
                    </div>
                </div>
            </nav>
            
            <main id="main-content" class="p-4 md:p-10 max-w-7xl mx-auto w-full flex-grow"></main>

            <!-- Floating Symmetrical Bottom Nav Bar Pinned Structure -->
            <div id="floating-bottom-nav-bar" class="glass p-2 rounded-[2.5rem] shadow-2xl border border-white/10">
                <div class="grid grid-cols-4 w-full gap-1 justify-items-center items-center">
                    <button id="tab-home" onclick="setTab('home')" class="tab-btn active">Home</button>
                    <button id="tab-groups" onclick="setTab('groups')" class="tab-btn">Groups</button>
                    <button id="tab-courses" onclick="setTab('courses')" class="tab-btn">Courses</button>
                    <button id="tab-content" onclick="setTab('content')" class="tab-btn">Content</button>
                </div>
            </div>
        </div>
    </div>

    <div id="onboarding-screen" class="hidden min-h-screen flex items-center justify-center p-6 relative">
        <button onclick="logout()" class="absolute top-10 right-10 text-2xl font-black text-white/30 hover:text-white">✕</button>
        <div class="w-full max-w-md glass p-10 rounded-[3.5rem] border-brandOrange/20 shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-6 italic">Finalize Profile</h2>
            <div class="space-y-4">
                <input type="text" id="ob-name" placeholder="Full Name" class="input-field">
                <select id="ob-role" class="input-field">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
                <input type="password" id="ob-pass" placeholder="Secure Password" class="input-field">
                <button onclick="finalizeProfile()" class="w-full py-5 btn-brand">Activate</button>
            </div>
        </div>
    </div>

    <div onclick="toggleAIChat()" class="fixed bottom-24 right-6 z-[5000] w-16 h-16 rounded-full btn-brand flex items-center justify-center text-3xl cursor-pointer shadow-2xl select-none">🤖</div>
    <div id="ai-chat-window" class="hidden fixed bottom-44 right-6 w-[340px] md:w-[380px] h-[500px] glass rounded-[2rem] z-[5000] overflow-hidden flex flex-col border border-brandOrange/20">
        <div class="p-5 border-b border-white/10 flex justify-between items-center"><h2 class="font-black text-lg italic text-brandOrange">OpenClass AI</h2><button onclick="toggleAIChat()">✕</button></div>
        <div id="ai-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-4 border-t border-white/10 flex gap-3"><input id="ai-input" type="text" placeholder="Ask AI..." class="input-field flex-1"><button onclick="sendAIMessage()" class="btn-brand px-5 rounded-xl">Send</button></div>
    </div>

    <script type="module">
        import * as Core from "./app.js";
        import { aiConfig } from "./config.js";

        let profile = null, isSignup = false, otpCode = null, tempUser = null, activeGroupId = null, currentTab = 'home', videoPlayer = null;
        let currentVideoContext = null, watermarkInterval = null, groupMessageTrackers = {}, notificationsMap = [];
        
        const tabsOrderIndex = ['home', 'groups', 'courses', 'content'];
        let touchStartCoordsX = 0;
        let touchEndCoordsX = 0;

        let cart = [];
        try {
            const preservedCart = localStorage.getItem('oc_cart_manifest');
            if(preservedCart) { cart = JSON.parse(preservedCart); }
        } catch(e) { cart = []; }

        function initializeSwipeGestures() {
            const mainContentNode = document.getElementById('main-content');
            if(!mainContentNode) return;

            mainContentNode.addEventListener('touchstart', (e) => {
                touchStartCoordsX = e.changedTouches[0].screenX;
            }, { passive: true });

            mainContentNode.addEventListener('touchend', (e) => {
                touchEndCoordsX = e.changedTouches[0].screenX;
                handleSwipeGestureEvaluation();
            }, { passive: true });
        }

        function handleSwipeGestureEvaluation() {
            const thresholdDelta = 75; 
            const deltaX = touchEndCoordsX - touchStartCoordsX;
            const currentTabPos = tabsOrderIndex.indexOf(currentTab);

            if (Math.abs(deltaX) < thresholdDelta) return;

            if (deltaX > 0) {
                if (currentTabPos > 0) {
                    setTab(tabsOrderIndex[currentTabPos - 1]);
                }
            } else {
                if (currentTabPos < tabsOrderIndex.length - 1) {
                    setTab(tabsOrderIndex[currentTabPos + 1]);
                }
            }
        }

        function toggleBottomNavBarVisibility(visible) {
            const navBar = document.getElementById('floating-bottom-nav-bar');
            if(!navBar) return;
            if(visible) navBar.classList.remove('nav-hidden');
            else navBar.classList.add('nav-hidden');
        }

        function activateAntiTheftShields() {
            const blankOverlay = document.getElementById('anti-theft-blank');
            const watermarkEl = document.getElementById('secure-watermark');

            if (profile && profile.email) {
                watermarkEl.innerText = profile.email;
                moveWatermark();
                clearInterval(watermarkInterval);
                watermarkInterval = setInterval(moveWatermark, 2500);
            }

            window.addEventListener('blur', engageShield);
            document.addEventListener('visibilitychange', handleVisibility);
            
            blankOverlay.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (videoPlayer && typeof videoPlayer.pause === 'function') videoPlayer.pause();
            }, true);

            function engageShield() {
                if (videoPlayer && typeof videoPlayer.pause === 'function') videoPlayer.pause();
                blankOverlay.style.display = 'flex';
                
                const plyrContainer = document.querySelector('.plyr');
                if(plyrContainer) {
                    plyrContainer.appendChild(blankOverlay);
                    plyrContainer.appendChild(watermarkEl);
                }
            }

            function handleVisibility() {
                if (document.visibilityState === 'hidden') engageShield();
                else {
                    blankOverlay.style.display = 'none';
                }
            }

            window._disengageShields = () => {
                window.removeEventListener('blur', engageShield);
                document.removeEventListener('visibilitychange', handleVisibility);
                clearInterval(watermarkInterval);
                blankOverlay.style.display = 'none';
                watermarkEl.innerText = "";
                const wrapper = document.getElementById('vault-wrapper');
                if(wrapper) {
                    wrapper.insertBefore(blankOverlay, wrapper.firstChild);
                    wrapper.insertBefore(watermarkEl, wrapper.children[1]);
                }
            };
        }

        function moveWatermark() {
            const watermarkEl = document.getElementById('secure-watermark');
            if (!watermarkEl || watermarkEl.innerText === "") return;
            watermarkEl.style.top = `${Math.floor(Math.random() * 70) + 15}%`;
            watermarkEl.style.left = `${Math.floor(Math.random() * 65) + 15}%`;
        }

        window.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen') {
                document.getElementById('anti-theft-blank').style.display = 'flex';
                if (videoPlayer && typeof videoPlayer.pause === 'function') videoPlayer.pause();
                toast("Protected Asset Locked", "error");
            }
        });

        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey || e.shiftKey) && ['s', 'S', '4', '3', 'p', 'P'].includes(e.key)) {
                document.getElementById('anti-theft-blank').style.display = 'flex';
                if (videoPlayer && typeof videoPlayer.pause === 'function') videoPlayer.pause();
                toast("Capture Interrupted", "error");
            }
        });

        window.toggleExpandableSearch = (e) => {
            if(e) e.stopPropagation();
            const wrapper = document.getElementById('search-wrapper-node');
            const input = document.getElementById('g-search');
            const iconsRow = document.getElementById('nav-action-icons-row');
            const brandingBlock = document.getElementById('nav-branding-block');
            
            if(wrapper.classList.contains('expanded')) {
                wrapper.classList.remove('expanded');
                input.classList.add('hidden');
                input.value = "";
                iconsRow.classList.remove('hidden');
                if(brandingBlock) brandingBlock.classList.remove('hidden');
            } else {
                wrapper.classList.add('expanded');
                input.classList.remove('hidden');
                setTimeout(() => input.focus(), 50);
                iconsRow.classList.add('hidden');
                if(window.innerWidth < 768 && brandingBlock) brandingBlock.classList.add('hidden');
            }
        };

        window.collapseSearchOnBlur = () => {
            setTimeout(() => {
                const wrapper = document.getElementById('search-wrapper-node');
                const input = document.getElementById('g-search');
                const iconsRow = document.getElementById('nav-action-icons-row');
                const brandingBlock = document.getElementById('nav-branding-block');
                
                if(wrapper && wrapper.classList.contains('expanded')) {
                    wrapper.classList.remove('expanded');
                    if(input) { input.classList.add('hidden'); input.value = ""; }
                    if(iconsRow) iconsRow.classList.remove('hidden');
                    if(brandingBlock) brandingBlock.classList.remove('hidden');
                }
            }, 180);
        };

        window.showNotificationsHub = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            toggleBottomNavBarVisibility(false);
            modal.classList.remove('hidden');
            
            if(notificationsMap.length === 0) {
                content.innerHTML = `<div class="text-center py-10"><p class="text-sm font-bold opacity-30 uppercase">No updates found</p></div>`;
                return;
            }
            
            content.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black italic">Activity updates</h3>
                    <button onclick="clearNotifications()" class="text-[10px] uppercase font-black text-brandOrange border border-brandOrange/20 px-3 py-1 rounded-xl hover:bg-brandOrange/5">Clear All</button>
                </div>
                <div class="space-y-3 max-h-[50vh] overflow-y-auto pr-2">
                    ${notificationsMap.map(n => `
                        <div class="p-4 rounded-2xl border border-white/5 bg-white/5 text-xs">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-brandOrange uppercase text-[9px] tracking-wider">${n.type}</span>
                                <span class="opacity-30 text-[9px]">${n.time}</span>
                            </div>
                            <p class="opacity-80">${n.text}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        window.clearNotifications = () => {
            notificationsMap = [];
            document.getElementById('notify-pill').classList.add('hidden');
            toast("Notifications cleared");
            closeCustomModal();
        };

        function pushSystemNotification(type, text) {
            notificationsMap.unshift({ type, text, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            const pill = document.getElementById('notify-pill');
            if(pill) {
                pill.innerText = notificationsMap.length;
                pill.classList.remove('hidden');
            }
        }

        window.getFileBadge = (url) => {
            if (!url) return '';
            const clean = url.toLowerCase().trim();
            let badgeText = "FILE";
            let color = "bg-zinc-700 text-white";
            
            if (clean.includes('.pdf')) { badgeText = "PDF"; color = "bg-red-600 text-white"; }
            else if (clean.match(/\.(mp4|webm|ogg|mov|avi)/) || clean.includes('youtube.com') || clean.includes('youtu.be')) { badgeText = "VIDEO"; color = "bg-brandBlue text-white"; }
            else if (clean.match(/\.(jpeg|jpg|gif|png|webp|svg)/)) { badgeText = "IMG"; color = "bg-green-600 text-white"; }
            else if (clean.includes('firebasestorage')) { badgeText = "CLOUD"; color = "bg-purple-600 text-white"; }
            
            return `<span class="absolute bottom-2 right-2 ${color} text-[8px] font-black tracking-widest px-2 py-0.5 rounded-md shadow-md uppercase border border-white/10 z-10">${badgeText}</span>`;
        };

        window.showProfileSettings = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');

            const cleanUrl = url.toLowerCase().trim();
            if (cleanUrl.match(/\.(jpeg|jpg|gif|png|webp|svg)/)) return url;
            if (cleanUrl.includes('v=')) return `https://img.youtube.com/vi/${url.split('v=')[1].split('&')[0]}/mqdefault.jpg`;
            if (cleanUrl.includes('youtu.be/')) return `https://img.youtube.com/vi/${url.split('/').pop().split('?')[0]}/mqdefault.jpg`;
            if (cleanUrl.includes('/live/')) return `https://img.youtube.com/vi/${url.split('/live/')[1].split('?')[0]}/mqdefault.jpg`;
            return "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop";

        window.checkLiveStatus = (dateStr, startTimeStr, endTimeStr) => {
            if (!dateStr || !startTimeStr) return 'recorded';
            try {
                const targetStart = new Date(`${dateStr} ${startTimeStr}`);
                const targetEnd = endTimeStr ? new Date(`${dateStr} ${endTimeStr}`) : new Date(targetStart.getTime() + 180 * 60000);
                const currentDateTime = new Date();
                
                if (currentDateTime >= targetStart && currentDateTime <= targetEnd) {
                    return 'live';
                }
                return 'recorded';
            } catch(e) {
                return 'recorded';
            }
        };

        function setupPlayer(videoId, metadata, rawUrl) {
            currentVideoContext = metadata;
            const container = document.getElementById('player-container');
            container.innerHTML = "";
            
            if (videoPlayer) { try { videoPlayer.destroy(); } catch(e){} }

            const cleanUrl = rawUrl.toLowerCase().trim();
            const isDirectFile = cleanUrl.match(/\.(mp4|webm|ogg|mp3|wav|jpeg|jpg|gif|png|webp|svg|pdf)/) || cleanUrl.includes('firebasestorage.googleapis');

            if (!videoId && !isDirectFile) {
                window.open(rawUrl, '_blank');
                closeVault();
                toast("Redirecting to External Resource");
                return;
            }

            if (isDirectFile && cleanUrl.match(/\.(jpeg|jpg|gif|png|webp|svg)/)) {
                container.innerHTML = `<div class="w-full h-full flex items-center justify-center bg-zinc-950"><img src="${rawUrl}" class="max-w-full max-h-[75vh] object-contain rounded-xl shadow-2xl"></div>`;
                toggleBottomNavBarVisibility(false);
                activateAntiTheftShields();
                return;
            }

            if (isDirectFile && cleanUrl.includes('.pdf')) {
                container.innerHTML = `<iframe src="https://docs.google.com/gview?url=${encodeURIComponent(rawUrl)}&embedded=true" class="w-full h-full border-0 rounded-2xl"></iframe>`;
                toggleBottomNavBarVisibility(false);
                activateAntiTheftShields();
                return;
            }

            const playerDiv = document.createElement('div');
            playerDiv.id = 'player-instance';
            container.appendChild(playerDiv);

            if (videoId) {
                playerDiv.setAttribute('data-plyr-provider', 'youtube');
                playerDiv.setAttribute('data-plyr-embed-id', videoId);
                videoPlayer = new Plyr('#player-instance', {
                    autoplay: true,
                    youtube: { noCookie: true, rel: 0, showinfo: 0, iv_load_policy: 3, modestbranding: 1, controls: 0 }
                });
            } else {
                playerDiv.innerHTML = `<video src="${rawUrl}" controls crossorigin class="w-full h-full"></video>`;
                videoPlayer = new Plyr(playerDiv.querySelector('video'), { autoplay: true });
            }

            videoPlayer.on('play', () => {
                const shieldOn = document.getElementById('anti-theft-blank').style.display === 'flex';
                if(shieldOn) { videoPlayer.pause(); }
            });

            videoPlayer.on('enterfullscreen', () => {
                toggleBottomNavBarVisibility(false);
                const blankOverlay = document.getElementById('anti-theft-blank');
                const watermarkEl = document.getElementById('secure-watermark');
                const targetNode = document.querySelector('.plyr');
                if(targetNode) {
                    targetNode.appendChild(blankOverlay);
                    targetNode.appendChild(watermarkEl);
                }
            });

            videoPlayer.on('exitfullscreen', () => {
                toggleBottomNavBarVisibility(true);
                const blankOverlay = document.getElementById('anti-theft-blank');
                const watermarkEl = document.getElementById('secure-watermark');
                const wrapper = document.getElementById('vault-wrapper');
                if(wrapper) {
                    wrapper.insertBefore(blankOverlay, wrapper.firstChild);
                    wrapper.insertBefore(watermarkEl, wrapper.children[1]);
                }
            });

            activateAntiTheftShields();
        }

                    return `<div class="flex ${isM ? 'flex-row-reverse' : 'flex-row'} items-end gap-3"><img src="${d.senderPhoto || 'https://ui-avatars.com/api/?name='+d.sender}" class="w-8 h-8 rounded-full border border-white/10 object-cover bg-black"><div class="flex flex-col ${isM ? 'items-end' : 'items-start'}"><p class="text-[8px] opacity-40 uppercase font-black px-2 mb-1 text-zinc-500">${d.sender}</p><div class="inline-block p-4 rounded-2xl ${isM ? 'bg-brandOrange text-white' : 'bg-white/10'} text-sm shadow-xl">${d.text}</div></div></div>`;
                }).join('');
                document.getElementById('group-chat-messages').scrollTop = 99999;
            });
        };

        window.sendGroupMessage = async () => {
            const i = document.getElementById('group-message-input'), t = i.value.trim();
            if (!t || !activeGroupId) return;
            await Core.addDoc(Core.collection(Core.db, "groupMessages"), { groupId: activeGroupId, senderId: Core.auth.currentUser.uid, sender: profile.name, senderPhoto: profile.photo || '', text: t, createdAt: Core.serverTimestamp() });
            i.value = '';
        };

        window.sendAIMessage = async () => {
            const i = document.getElementById('ai-input'), m = i.value.trim();
            if (!m) return;
            const chat = document.getElementById('ai-messages');
            chat.innerHTML += `<div class="ml-auto bg-brandOrange text-white p-4 rounded-2xl max-w-[80%] text-sm shadow-md">${m}</div>`;
            i.value = '';
            
            let videoIdentityPrompt = "No media context active.";
            if (currentVideoContext && currentVideoContext.link) {
                videoIdentityPrompt = `Active Media Resource: "${currentVideoContext.title}" URL: ${currentVideoContext.link}.`;
            }

            const context = `User: ${profile?.name}. Permission Tier: ${profile?.role}. Active Anchor: ${videoIdentityPrompt}`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${aiConfig.geminiKey}`, {
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        contents: [{ 
                            role: "user",
                            parts: [{ 
                                text: `${context} \nSystem Directive: You are the virtual teacher core assistant of the OpenClass LMS ecosystem. Respond intelligently.\nQuery: ${m}` 
                            }] 
                        }] 
                    })
                });
                const data = await response.json();
                const textReply = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="bg-white/10 p-4 rounded-2xl max-w-[80%] text-sm text-zinc-200 leading-relaxed">${textReply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { toast("AI Core handshake interruption", "error"); }
        };

        window.viewTeacher = async (tId) => {
            const main = document.getElementById('main-content');
            const [uS, cS, coS] = await Promise.all([Core.getDocs(Core.query(Core.collection(Core.db, "users"), Core.where("teacherId", "==", tId))), Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "==", tId))), Core.getDocs(Core.query(Core.collection(Core.db, "courses"), Core.where("teacherId", "==", tId)))]);
            if(uS.empty) return navigate('home');
            const tD = uS.docs[0].data(), isF = profile.subs?.includes(tId);
            
            const contentSorted = cS.docs.sort((a,b) => (b.data().date?.seconds || 0) - (a.data().date?.seconds || 0));
            const coursesSorted = coS.docs.sort((a,b) => (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0));

            main.innerHTML = `<div class="space-y-10">
                <div class="glass p-6 md:p-10 rounded-[4rem] border border-brandBlue/30 flex flex-col md:flex-row justify-between items-center gap-6 shadow-2xl">
                    <div class="flex items-center gap-6 md:gap-8">
                        <img src="${tD.photo || 'https://ui-avatars.com/api/?name='+tD.name}" class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-brandBlue object-cover bg-black shadow-2xl">
                        <div>
                            <h2 class="text-2xl md:text-4xl font-black italic tracking-tighter">${tD.name}</h2>
                            <p class="text-xs md:text-sm font-bold text-brandBlue uppercase opacity-60">${tD.teacherId}</p>
                        </div>
                    </div>
                    <button onclick="handleSub('${tId}', ${isF})" class="w-full md:w-auto px-10 py-4 ${isF ? 'bg-zinc-800' : 'btn-brand'} rounded-2xl font-black text-xs uppercase">${isF ? 'Unfollow' : 'Follow Instructor'}</button>
                </div>
                <h3 class="text-2xl font-black mb-6">Course Collections</h3>
                <div id="courses-feed" class="grid md:grid-cols-2 gap-6 mb-10"></div>
                <h3 class="text-2xl font-black mb-6">Syllabus Catalog Items</h3>
                <div id="feed" class="space-y-4"></div>
            </div>`;
            renderFeed(contentSorted, false); renderCourses(coursesSorted);
        };

        window.handleSub = async (tId, isF) => {
            await Core.updateDoc(Core.doc(Core.db, "users", Core.auth.currentUser.uid), { subs: isF ? Core.arrayRemove(tId) : Core.arrayUnion(tId) });
            profile.subs = isF ? profile.subs.filter(i => i !== tId) : [...(profile.subs||[]), tId];
            pushSystemNotification("ROSTER MUTATION", `Follow state synchronized for instructor: ${tId}`);
            viewTeacher(tId);
        };

        Core.onAuthStateChanged(Core.auth, async (user) => {
            if (user) {
                const docSnap = await Core.getDoc(Core.doc(Core.db, "users", user.uid));
                if (!docSnap.exists()) showScreen('onboarding-screen');
                else {
                    profile = docSnap.data();
                    const pic = document.getElementById('nav-profile-pic');
                    if (pic) {
                        pic.innerHTML = `<img src="${profile.photo || 'https://ui-avatars.com/api/?name='+profile.name}" class="w-full h-full object-cover bg-black">`;
                        pic.className = `w-9 h-9 md:w-10 md:h-10 rounded-full border-2 overflow-hidden cursor-pointer block select-none ${profile.role === 'teacher' ? 'border-brandBlue' : 'border-brandOrange'}`;
                    }
                    showScreen('dashboard'); navigate(window.location.hash.substring(1) || 'home');
                    listenUnreadNotifications();
                    initializeSwipeGestures();
                }
            } else showScreen('auth-screen');
        });

        function listenUnreadNotifications() {
            Core.onSnapshot(Core.collection(Core.db, "groupMessages"), (snap) => {
                if(document.getElementById('group-chat-window').classList.contains('hidden') === false) {
                    if(activeGroupId) groupMessageTrackers[activeGroupId] = 0;
                }
                snap.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const msg = change.doc.data();
                        if (msg.groupId && msg.groupId !== activeGroupId && msg.senderId !== Core.auth.currentUser.uid) {
                            groupMessageTrackers[msg.groupId] = (groupMessageTrackers[msg.groupId] || 0) + 1;
                            updateNotificationUIBadge(msg.groupId);
                        }
                    }
                });
            });
        }

        function updateNotificationUIBadge(gid) {
            const el = document.getElementById(`badge-${gid}`);
            const count = groupMessageTrackers[gid] || 0;
            if(el) {
                if(count > 0) { el.innerText = count + " new"; el.classList.remove('hidden'); }
                else { el.classList.add('hidden'); }
            }
        }

        window.toggleAIChat = () => {
            const chatWindow = document.getElementById('ai-chat-window');
            chatWindow.classList.toggle('hidden');
            if(!chatWindow.classList.contains('hidden')) toggleBottomNavBarVisibility(false);
            else toggleBottomNavBarVisibility(true);
        };
        
        window.closeGroupChat = () => { 
            document.getElementById('group-chat-window').classList.add('hidden'); 
            activeGroupId = null; 
            toggleBottomNavBarVisibility(true);
            loadGroups(); 
        };
        window.toggleMode = () => { 
            document.documentElement.classList.toggle('light'); 
            localStorage.setItem('oc_theme', document.documentElement.classList.contains('light')); 
        };
        window.closeCustomModal = () => {
            document.getElementById('custom-modal').classList.add('hidden');
            toggleBottomNavBarVisibility(true);
        };
        
        window.closeVault = () => { 
            document.getElementById('media-vault').classList.add('hidden'); 
            currentVideoContext = null; 
            toggleBottomNavBarVisibility(true);
            if(window._disengageShields) window._disengageShields();
            if(videoPlayer) { try { videoPlayer.destroy(); } catch(e){} videoPlayer = null; } 
        };
        
        function showScreen(id) { ['auth-screen', 'verify-screen', 'onboarding-screen', 'dashboard'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function toast(m, type = "s") { const b = document.getElementById('toast-box'), d = document.createElement('div'); d.className = 'toast-pill'; if (type === "error") d.style.borderColor = "red"; d.innerText = m; b.appendChild(d); setTimeout(() => d.remove(), 2500); }
        if (localStorage.getItem('oc_theme') === 'true') document.documentElement.classList.add('light');

        async function loadGroups() {
            const container = document.getElementById('student-groups'); if (!container) return;
            const snap = await Core.getDocs(Core.query(Core.collection(Core.db, "groups")));
            
            container.innerHTML = snap.docs.filter(d => d.data().members?.includes(Core.auth.currentUser.uid) || d.data().teacherId === profile.teacherId).map(docSnap => {
                const g = docSnap.data();
                const unreadCount = groupMessageTrackers[docSnap.id] || 0;
                return `<div class="glass p-6 rounded-[2rem] flex justify-between items-center border border-white/5 hover:border-brandOrange/20 transition-all group"><div><span class="text-[9px] text-brandOrange font-black uppercase tracking-widest">${g.type}</span><div class="flex items-center gap-3"><h3 class="text-xl font-black">${g.name}</h3><span id="badge-${docSnap.id}" class="${unreadCount===0?'hidden':''} bg-brandOrange text-white text-[9px] font-extrabold px-2.5 py-0.5 rounded-full animate-bounce">${unreadCount} unread</span></div><p class="text-xs opacity-40">${g.code}</p></div><div class="flex gap-2"><button onclick="openGroupChat('${docSnap.id}', '${g.name}')" class="btn-brand px-6 py-2 text-[10px]">Open Sync Hub</button></div></div>`;
            }).join('');
        }

        function renderGroups(docs, isT) {
            const container = document.getElementById('student-groups') || document.getElementById('tab-display'); if(!container) return;
            container.innerHTML = `<div class="space-y-4">${docs.map(d => {
                const g = d.data();
                const unreadCount = groupMessageTrackers[d.id] || 0;
                return `<div class="glass p-6 rounded-[2rem] flex justify-between items-center group border border-white/5 hover:border-brandBlue/20 transition-all"><div><span class="text-[9px] text-brandBlue font-black uppercase tracking-widest">${g.type}</span><div class="flex items-center gap-3"><h3 class="text-xl font-black">${g.name}</h3><span id="badge-${d.id}" class="${unreadCount===0?'hidden':''} bg-brandBlue text-white text-[9px] font-extrabold px-2.5 py-0.5 rounded-full">${unreadCount}</span></div><p class="text-xs opacity-40">${g.code}</p></div><div class="flex gap-2"><button onclick="openGroupChat('${d.id}', '${g.name}')" class="btn-brand px-6 py-2 text-[10px]">Manage Pool</button><button onclick="delG('${d.id}')" class="bg-red-500/10 text-red-500 p-2 rounded-xl hover:bg-red-500 hover:text-white transition-all">🗑</button></div></div>`;
            }).join('')}</div>`;
        }
        window.delG = async (id) => { if(confirm("Confirm asset group dissolution?")) { await Core.deleteDoc(Core.doc(Core.db, "groups", id)); loadHome(); } };
        window.onclick = (e) => { if (e.target === document.getElementById('custom-modal')) document.getElementById('custom-modal').classList.add('hidden'); };
    </script>
</body>
</html>
