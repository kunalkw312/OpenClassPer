<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Premium SaaS LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brandBlue: '#004a80', brandOrange: '#f7941d' } } } }
    </script>
    <style>
        :root { --text-main: #fdfbf7; --bg-main: #050505; --glass-bg: rgba(15, 15, 15, 0.9); --input-bg: #111; }
        .light { --text-main: #002e50; --bg-main: #fdfbf7; --glass-bg: rgba(255, 255, 255, 0.85); --input-bg: #fff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: 0.4s; overflow-x: hidden; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid rgba(128, 128, 128, 0.1); }
        .btn-brand { background: linear-gradient(135deg, #004a80 0%, #f7941d 100%); background-size: 200% auto; transition: 0.5s; color: white !important; font-weight: 800; text-transform: uppercase; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-brand:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 74, 128, 0.2); }
        .tab-btn { padding: 12px 20px; font-weight: 800; text-transform: uppercase; font-size: 10px; border-radius: 12px; transition: 0.3s; opacity: 0.4; color: var(--text-main); }
        .tab-btn.active { background: rgba(247, 148, 29, 0.1); color: #f7941d; opacity: 1; border: 1px solid rgba(247, 148, 29, 0.2); }
        .input-field { background: var(--input-bg); border: 1px solid rgba(128, 128, 128, 0.2); color: var(--text-main); outline: none; padding: 1rem; border-radius: 14px; width: 100%; }
        #toast-box { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast-pill { background: #111; color: #fff; padding: 0.6rem 1.5rem; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: 800; text-transform: uppercase; animation: popUp 0.3s forwards; }
        
        /* Fixed Player Height Cutoffs and Hidden YouTube Overlays */
        #vault-wrapper { height: 100%; width: 100%; aspect-ratio: 16/9; max-height: 80vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .plyr { width: 100% !important; height: 100% !important; max-height: 80vh !important; }
        .plyr__video-wrapper { height: 100% !important; }
        #media-vault .plyr__video-embed iframe { transform: scale(1.35); pointer-events: none; top: -17%; height: 134%; }
        .plyr--full-ui.plyr--video .plyr__control--overlaid { background: #f7941d; }
        .plyr--video .plyr__controls { background: linear-gradient(transparent, rgba(0,0,0,0.9)); border-radius: 0 0 14px 14px; }
        .grid-btn-active { background: rgba(247, 148, 29, 0.2) !important; border: 1px solid rgba(247, 148, 29, 0.3) !important; color: #f7941d !important; }

        /* Anti-Theft Protection Shield Mode */
        #anti-theft-blank {
            display: none;
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        #secure-watermark {
            position: absolute;
            z-index: 2800;
            pointer-events: none;
            font-weight: 800;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.12);
            mix-blend-mode: difference;
            white-space: nowrap;
            user-select: none;
            transition: all 1.2s ease-in-out;
        }

        @keyframes popUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-brandOrange/30">
    <div id="toast-box"></div>

    <div id="custom-modal" class="hidden fixed inset-0 z-[2500] bg-black/95 backdrop-blur-md flex items-center justify-center p-6">
        <div id="modal-content" class="w-full max-w-xl glass p-10 rounded-[3rem] border border-brandOrange/20 shadow-2xl overflow-y-auto max-h-[90vh]"></div>
    </div>

    <div id="media-vault" class="hidden fixed inset-0 z-[2000] bg-black flex items-center justify-center p-4">
        <button onclick="closeVault()" class="absolute top-6 right-6 bg-white/10 hover:bg-red-500 text-white w-12 h-12 rounded-full flex items-center justify-center font-black z-[3100]">✕</button>
        <div class="w-full max-w-5xl overflow-hidden rounded-2xl shadow-2xl relative flex items-center justify-center">
             <div id="anti-theft-blank">⚠️ Screen Capture / Recording Warning: Active Assets Paused</div>
             <div id="secure-watermark"></div>
             <div id="vault-wrapper">
                 <div id="player-container" class="w-full h-full"></div>
             </div>
        </div>
    </div>

    <div id="group-chat-window" class="hidden fixed inset-0 bg-black/95 z-[6000] flex flex-col">
        <div class="p-5 glass flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-4">
                <h2 id="group-chat-title" class="text-2xl font-black italic">Group</h2>
                <button id="group-roster-btn" class="text-xs font-bold text-brandOrange uppercase border border-brandOrange/20 px-3 py-1 rounded-lg hover:bg-brandOrange/10">Manage Members</button>
            </div>
            <button onclick="closeGroupChat()" class="text-2xl">✕</button>
        </div>
        <div id="group-chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div class="p-4 flex gap-4 glass border-t border-white/5">
            <input id="group-message-input" class="input-field flex-1" placeholder="Type message safely...">
            <button onclick="sendGroupMessage()" class="btn-brand px-8">Send</button>
        </div>
    </div>

    <div id="app">
        <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] text-center shadow-2xl">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-2xl object-cover">
                <h1 class="text-4xl font-black mb-8 italic">Open<span class="text-brandOrange">Class</span></h1>
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="student">Student Account</option>
                        <option value="teacher">Teacher Account</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button onclick="handleAuth()" id="primary-auth-btn" class="w-full py-4 btn-brand">Sign In</button>
                    <button onclick="handleGoogle()" class="w-full py-4 glass dark:text-white text-[#002e50] rounded-2xl font-bold uppercase text-[10px] flex items-center justify-center gap-4 border border-zinc-500/20">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> 
                        Continue with Google
                    </button>
                    <button onclick="toggleAuth()" id="toggle-auth-btn" class="w-full text-[10px] text-zinc-500 font-bold uppercase mt-6 hover:text-brandOrange">Create Profile</button>
                </div>
            </div>
        </div>

        <div id="verify-screen" class="hidden min-h-screen flex items-center justify-center p-6 relative">
            <button onclick="showScreen('auth-screen')" class="absolute top-10 right-10 text-2xl font-black text-white/30 hover:text-white">✕</button>
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] text-center border-brandOrange/20 shadow-2xl">
                <h2 class="text-3xl font-black mb-4 italic">Verify Code</h2>
                <p id="verify-note" class="text-zinc-500 text-[10px] mb-8 uppercase font-bold"></p>
                <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-5xl font-black mb-6">
                <button onclick="checkOTP()" class="w-full py-5 btn-brand shadow-xl">Verify</button>
            </div>
        </div>

        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-5 glass border-b border-white/5 sticky top-0 z-[1000] flex flex-col md:flex-row gap-6 justify-between px-10 items-center">
                <div class="flex items-center gap-4 cursor-pointer" onclick="navigate('home')">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-10 rounded-xl">
                    <h2 class="text-2xl font-black italic tracking-tighter">Open<span class="text-brandOrange">Class</span></h2>
                </div>
                
                <div class="flex gap-1 glass p-1 rounded-2xl">
                    <button id="tab-home" onclick="setTab('home')" class="tab-btn active">Home</button>
                    <button id="tab-groups" onclick="setTab('groups')" class="tab-btn">Groups</button>
                    <button id="tab-courses" onclick="setTab('courses')" class="tab-btn">Courses</button>
                    <button id="tab-content" onclick="setTab('content')" class="tab-btn">Content</button>
                </div>

                <div class="flex items-center gap-6 w-full md:w-auto relative">
                    <div class="relative w-full md:w-72 group">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="8" cy="8" r="6" /><path d="M13 13l4 4" /></svg></div>
                        <input type="text" id="g-search" oninput="reactiveSearch(this.value)" placeholder="Search campus..." class="input-field rounded-2xl pl-12 pr-6 py-2.5 text-sm w-full">
                    </div>
                    <button onclick="showCart()" class="p-2 glass rounded-xl relative">🛒 <span id="cart-pill" class="hidden absolute -top-1 -right-1 bg-brandOrange text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center">0</span></button>
                    <button onclick="toggleMode()" class="p-2 glass rounded-xl">🌓</button>
                    <div id="nav-profile-pic" class="w-10 h-10 rounded-full border-2 overflow-hidden hidden md:block"></div>
                    <button onclick="logout()" class="text-[10px] font-black text-red-500 uppercase px-4 py-2 border border-red-500/20 rounded-xl">Logout</button>
                </div>
            </nav>
            <main id="main-content" class="p-10 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <div id="onboarding-screen" class="hidden min-h-screen flex items-center justify-center p-6 relative">
        <button onclick="logout()" class="absolute top-10 right-10 text-2xl font-black text-white/30 hover:text-white">✕</button>
        <div class="w-full max-w-md glass p-10 rounded-[3.5rem] border-brandOrange/20 shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-6 italic">Finalize Profile</h2>
            <div class="space-y-4">
                <input type="text" id="ob-name" placeholder="Full Name" class="input-field">
                <select id="ob-role" class="input-field">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
                <input type="password" id="ob-pass" placeholder="Secure Password" class="input-field">
                <button onclick="finalizeProfile()" class="w-full py-5 btn-brand">Activate</button>
            </div>
        </div>
    </div>

    <div onclick="toggleAIChat()" class="fixed bottom-6 right-6 z-[5000] w-16 h-16 rounded-full btn-brand flex items-center justify-center text-3xl cursor-pointer shadow-2xl">🤖</div>
    <div id="ai-chat-window" class="hidden fixed bottom-24 right-6 w-[380px] h-[600px] glass rounded-[2rem] z-[5000] overflow-hidden flex flex-col border border-brandOrange/20">
        <div class="p-5 border-b border-white/10 flex justify-between items-center"><h2 class="font-black text-lg italic text-brandOrange">OpenClass AI</h2><button onclick="toggleAIChat()">✕</button></div>
        <div id="ai-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-4 border-t border-white/10 flex gap-3"><input id="ai-input" type="text" placeholder="Ask AI..." class="input-field flex-1"><button onclick="sendAIMessage()" class="btn-brand px-5 rounded-xl">Send</button></div>
    </div>

    <script type="module">
        import * as Core from "./app.js";
        import { aiConfig } from "./config.js";

        let profile = null, isSignup = false, otpCode = null, tempUser = null, activeGroupId = null, currentTab = 'home', videoPlayer = null;
        let currentVideoContext = null, watermarkInterval = null, cart = [], groupMessageTrackers = {};

        // --- ANTI-THEFT PROTECTION MATRIX ---
        function activateAntiTheftShields() {
            const blankOverlay = document.getElementById('anti-theft-blank');
            const watermarkEl = document.getElementById('secure-watermark');

            if (profile && profile.email) {
                watermarkEl.innerText = profile.email;
                moveWatermark();
                clearInterval(watermarkInterval);
                watermarkInterval = setInterval(moveWatermark, 2500);
            }

            window.addEventListener('blur', engageShield);
            document.addEventListener('visibilitychange', handleVisibility);
            
            function engageShield() {
                if (videoPlayer && typeof videoPlayer.pause === 'function') videoPlayer.pause();
                blankOverlay.style.display = 'flex';
            }

            function handleVisibility() {
                if (document.visibilityState === 'hidden') engageShield();
                else blankOverlay.style.display = 'none';
            }

            window._disengageShields = () => {
                window.removeEventListener('blur', engageShield);
                document.removeEventListener('visibilitychange', handleVisibility);
                clearInterval(watermarkInterval);
                blankOverlay.style.display = 'none';
                watermarkEl.innerText = "";
            };
        }

        function moveWatermark() {
            const watermarkEl = document.getElementById('secure-watermark');
            if (!watermarkEl || watermarkEl.innerText === "") return;
            watermarkEl.style.top = `${Math.floor(Math.random() * 70) + 15}%`;
            watermarkEl.style.left = `${Math.floor(Math.random() * 65) + 15}%`;
        }

        window.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen') {
                document.getElementById('anti-theft-blank').style.display = 'flex';
                if (videoPlayer && typeof videoPlayer.pause === 'function') videoPlayer.pause();
                toast("Protected Asset Locked", "error");
            }
        });

        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey || e.shiftKey) && ['s', 'S', '4', '3', 'p', 'P'].includes(e.key)) {
                document.getElementById('anti-theft-blank').style.display = 'flex';
                if (videoPlayer && typeof videoPlayer.pause === 'function') videoPlayer.pause();
                toast("Capture Interrupted", "error");
            }
        });

        // --- HARDENED ASSET PROCESSING INTERFACE ---
        window.getSmartPreview = (url) => {
            if (!url) return "https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg";
            const cleanUrl = url.toLowerCase().trim();
            if (cleanUrl.match(/\.(jpeg|jpg|gif|png|webp|svg)/)) return url;
            if (cleanUrl.includes('v=')) return `https://img.youtube.com/vi/${url.split('v=')[1].split('&')[0]}/mqdefault.jpg`;
            if (cleanUrl.includes('youtu.be/')) return `https://img.youtube.com/vi/${url.split('/').pop().split('?')[0]}/mqdefault.jpg`;
            if (cleanUrl.includes('/live/')) return `https://img.youtube.com/vi/${url.split('/live/')[1].split('?')[0]}/mqdefault.jpg`;
            return "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop";
        };

        window.checkLiveStatus = (dateStr, timeStr) => {
            if (!dateStr || !timeStr) return 'recorded';
            try {
                const targetDateTime = new Date(`${dateStr} ${timeStr}`);
                const currentDateTime = new Date();
                const differenceInMinutes = (currentDateTime - targetDateTime) / 60000;
                
                // Active window streaming for 180 minutes post start-time
                if (differenceInMinutes >= 0 && differenceInMinutes <= 180) {
                    return 'live';
                }
                return 'recorded';
            } catch(e) {
                return 'recorded';
            }
        };

        function setupPlayer(videoId, metadata, rawUrl) {
            currentVideoContext = metadata;
            const container = document.getElementById('player-container');
            container.innerHTML = "";
            
            if (videoPlayer) { try { videoPlayer.destroy(); } catch(e){} }

            const cleanUrl = rawUrl.toLowerCase().trim();
            const isDirectFile = cleanUrl.match(/\.(mp4|webm|ogg|mp3|wav|jpeg|jpg|gif|png|webp|svg|pdf)/) || cleanUrl.includes('firebasestorage.googleapis');

            // Explicit instruction enforcement: Open non-direct links in new browser tabs
            if (!videoId && !isDirectFile) {
                window.open(rawUrl, '_blank');
                closeVault();
                toast("Redirecting to External Resource");
                return;
            }

            if (isDirectFile && cleanUrl.match(/\.(jpeg|jpg|gif|png|webp|svg)/)) {
                container.innerHTML = `<div class="w-full h-full flex items-center justify-center bg-zinc-950"><img src="${rawUrl}" class="max-w-full max-h-[75vh] object-contain rounded-xl shadow-2xl"></div>`;
                activateAntiTheftShields();
                return;
            }

            if (isDirectFile && cleanUrl.includes('.pdf')) {
                container.innerHTML = `<iframe src="https://docs.google.com/gview?url=${encodeURIComponent(rawUrl)}&embedded=true" class="w-full h-full border-0 rounded-2xl"></iframe>`;
                activateAntiTheftShields();
                return;
            }

            const playerDiv = document.createElement('div');
            playerDiv.id = 'player-instance';
            container.appendChild(playerDiv);

            if (videoId) {
                playerDiv.setAttribute('data-plyr-provider', 'youtube');
                playerDiv.setAttribute('data-plyr-embed-id', videoId);
                videoPlayer = new Plyr('#player-instance', {
                    autoplay: true,
                    // Hardened configuration blocks titles, channel notes, and recommendation layers
                    youtube: { noCookie: true, rel: 0, showinfo: 0, iv_load_policy: 3, modestbranding: 1, controls: 0 }
                });
            } else {
                playerDiv.innerHTML = `<video src="${rawUrl}" controls crossorigin class="w-full h-full"></video>`;
                videoPlayer = new Plyr(playerDiv.querySelector('video'), { autoplay: true });
            }

            activateAntiTheftShields();
        }

        // --- DASHBOARD DISPLAY PIPELINE ---
        window.setTab = (t) => {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${t}`)?.classList.add('active');
            loadHome();
        };

        window.reactiveSearch = (val) => { if (val.length < 2) return; navigate('search', val); };
        window.onpopstate = (e) => { if (profile) renderContent(e.state?.p || 'home', e.state?.q || ''); };
        window.navigate = (p, q = '') => { history.pushState({ p, q }, '', `#${p}`); renderContent(p, q); };

        async function renderContent(p, q) {
            if (p === 'home') loadHome();
            else if (p === 'search') loadSearch(q);
            else if (p === 'profile') viewTeacher(q);
        }

        window.loadHome = async () => {
            const main = document.getElementById('main-content');
            if (!profile) return;
            if (profile.role === 'teacher') {
                const [contentSnap, followersSnap, courseSnap, groupSnap] = await Promise.all([
                    Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "==", profile.teacherId))),
                    Core.getDocs(Core.query(Core.collection(Core.db, "users"), Core.where("subs", "array-contains", profile.teacherId))),
                    Core.getDocs(Core.query(Core.collection(Core.db, "courses"), Core.where("teacherId", "==", profile.teacherId))),
                    Core.getDocs(Core.query(Core.collection(Core.db, "groups"), Core.where("teacherId", "==", profile.teacherId)))
                ]);
                
                let totalViews = 0; contentSnap.forEach(d => totalViews += (d.data().views || 0));
                
                // Sorting chronological updates newest directly at top
                const contentSorted = contentSnap.docs.sort((a,b) => (b.data().date?.seconds || 0) - (a.data().date?.seconds || 0));
                const coursesSorted = courseSnap.docs.sort((a,b) => (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0));

                main.innerHTML = `
                <div class="grid lg:grid-cols-4 gap-10">
                    <div class="space-y-6 lg:sticky lg:top-32 h-fit">
                        <div class="glass p-8 rounded-[3rem] border border-brandBlue/30 text-center shadow-xl">
                            <img src="${profile.photo || 'https://ui-avatars.com/api/?name='+profile.name}" class="w-24 h-24 mx-auto mb-4 rounded-full border-4 border-brandBlue p-1 object-cover">
                            <h3 class="text-xl font-black italic">${profile.name}</h3>
                            <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-6">${profile.teacherId}</p>
                            <div class="grid grid-cols-2 gap-4">
                                <div onclick="manageFollowersRoster('${profile.teacherId}')" class="bg-white/5 p-4 rounded-3xl text-center cursor-pointer hover:bg-brandBlue/10 transition-all border border-white/5">
                                    <p class="text-[9px] opacity-30 font-bold uppercase">Followers</p>
                                    <p class="text-2xl font-black text-brandOrange">${followersSnap.size}</p>
                                </div>
                                <div class="bg-white/5 p-4 rounded-3xl text-center border border-white/5">
                                    <p class="text-[9px] opacity-30 font-bold uppercase">Views</p>
                                    <p class="text-2xl font-black">${totalViews}</p>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 glass p-4 rounded-[2rem]">
                            <button id="btn-create" onclick="switchTeacherView('create')" class="teacher-grid-btn p-4 rounded-xl bg-white/5 text-[9px] font-black uppercase transition-all">Hub Setup</button>
                            <button id="btn-course" onclick="switchTeacherView('course')" class="teacher-grid-btn p-4 rounded-xl bg-white/5 text-[9px] font-black uppercase transition-all">Launch Course</button>
                            <button id="btn-requests" onclick="switchTeacherView('requests')" class="teacher-grid-btn p-4 rounded-xl bg-white/5 text-[9px] font-black uppercase transition-all">Requests</button>
                            <button id="btn-publish" onclick="switchTeacherView('publish')" class="teacher-grid-btn p-4 rounded-xl bg-white/5 text-[9px] font-black uppercase transition-all grid-btn-active">Publish</button>
                        </div>
                        <div id="teacher-action-area" class="glass p-6 rounded-[2rem] space-y-4">
                            <input id="up-t" placeholder="Asset Title" class="input-field text-xs p-3">
                            <input id="up-u" placeholder="Resource Access URL" class="input-field text-xs p-3">
                            <select id="up-y" onchange="togglePublishScheduleField(this.value)" class="input-field text-xs p-3">
                                <option value="video">Recorded Video Resource</option>
                                <option value="live">Live Transmission</option>
                                <option value="file">Document/Image Material</option>
                            </select>
                            <div id="live-schedule-fields" class="hidden space-y-2 p-2 border border-white/5 bg-black/20 rounded-xl">
                                <p class="text-[8px] uppercase tracking-wider text-brandOrange font-bold font-mono">Transmission Scheduler</p>
                                <input type="date" id="up-date" class="input-field text-xs p-2">

            const inCart = cart.some(item => item.id === id);
            
            content.innerHTML = `
                <img src="${c.thumbnail}" class="w-full h-56 object-cover rounded-3xl mb-6 shadow-2xl border border-white/10">
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-black italic text-brandOrange">${c.title}</h2>${isT ? `<button onclick="delC('${id}')" class="text-red-500 font-black uppercase text-[10px]">Purge</button>` : ''}</div>
                <p class="opacity-70 mb-6 text-xs leading-relaxed">${c.description}</p>
                <div class="space-y-3 mb-8">
                    <p class="text-[9px] font-black uppercase opacity-40 tracking-wider">Course Syllabus Blueprint</p>
                    ${c.playlist.map((v, i) => `
                        <div onclick="openResource('null','${v.url}','${v.title}')" class="bg-white/5 p-4 rounded-2xl flex items-center justify-between cursor-pointer hover:bg-white/10 border border-white/5 transition-all">
                            <p class="text-xs font-bold">${i+1}. ${v.title}</p>
                            <span class="text-[10px] text-brandOrange font-black uppercase tracking-tighter">Access Stream</span>
                        </div>
                    `).join('')}
                </div>
                <div class="flex gap-4">
                    <button onclick="toggleCartAction('${id}','${c.title}','${c.price}')" class="flex-1 py-5 glass tracking-widest text-xs font-black uppercase rounded-2xl border border-white/20">${inCart?'Drop from Cart':'Add to Checkout Cart'}</button>
                    <button onclick="enrollCourse('${id}','${c.groupId}')" class="flex-1 py-5 btn-brand shadow-xl">${parseFloat(c.price)===0?'Instant Open Enrolment':`Acquire License (₹${c.price})`}</button>
                </div>
            `;
            document.getElementById('custom-modal').classList.remove('hidden');
        };

        window.enrollCourse = async (cid, gid) => {
            await Core.updateDoc(Core.doc(Core.db, "groups", gid), { members: Core.arrayUnion(Core.auth.currentUser.uid) });
            toast("License synced successfully! Roster operation active.");
            document.getElementById('custom-modal').classList.add('hidden');
            setTab('groups');
        };

        window.delC = async (id) => { if(confirm("Confirm structural purge?")) { await Core.deleteDoc(Core.doc(Core.db,"courses",id)); document.getElementById('custom-modal').classList.add('hidden'); loadHome(); } };

        function renderFeed(docs, isT, target = 'feed') { 
            const container = document.getElementById(target) || document.getElementById('tab-display');
            if (container) container.innerHTML = docs.map(d => renderResourceCard(d, isT)).join(''); 
        }

        function renderCourses(docs, isT) {
            const container = document.getElementById('courses-feed') || document.getElementById('tab-display');
            if (container) container.innerHTML = `<div class="grid md:grid-cols-2 gap-6 w-full">${docs.map(doc => {
                const c = doc.data();
                return `<div class="glass p-6 rounded-[2.5rem] border border-white/5 flex flex-col justify-between"><img src="${c.thumbnail}" class="w-full h-52 object-cover rounded-2xl mb-4 border border-white/5"><div><h2 class="text-xl font-black italic mb-2 truncate">${c.title}</h2><div class="flex justify-between items-center mt-4"><h3 class="text-lg font-black text-brandOrange">${parseFloat(c.price)===0?'FREE':'₹'+c.price}</h3><button onclick="openCourse('${doc.id}')" class="btn-brand px-6 py-2 text-xs">Inspect Module</button></div></div></div>`;
            }).join('')}</div>`;
        }

        function renderResourceCard(d, isT) {
            const i = d.data();
            let liveStatusLabel = '';
            
            if (i.type === 'live') {
                const status = window.checkLiveStatus(i.liveDate, i.liveTime);
                if (status === 'live') {
                    liveStatusLabel = `<span class="flex items-center gap-1.5 bg-red-600/20 text-red-500 text-[8px] font-black px-2 py-0.5 rounded-full border border-red-500/20"><span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>LIVE NOW</span>`;
                } else {
                    liveStatusLabel = `<span class="flex items-center gap-1.5 bg-brandOrange/20 text-brandOrange text-[8px] font-black px-2 py-0.5 rounded-full border border-brandOrange/20"><span class="w-1.5 h-1.5 rounded-full bg-brandOrange"></span>RECORDED</span>`;
                }
            }

            return `<div class="glass p-5 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center group shadow-xl gap-6 border border-white/5"><div class="flex items-center gap-6 w-full md:w-auto"><div class="relative flex-shrink-0"><img src="${window.getSmartPreview(i.url)}" class="w-32 h-20 rounded-2xl object-cover bg-brandBlue shadow-md border border-white/10">${liveStatusLabel}</div><div class="overflow-hidden"><h4 class="font-black text-lg italic truncate max-w-xs md:max-w-md">${i.title}</h4><p class="text-[9px] opacity-40 uppercase font-bold tracking-widest mt-1">${i.tName} • ${i.views || 0} Views ${i.liveTime ? '• Scheduled: ' + i.liveDate + ' ' + i.liveTime : ''}</p></div></div><div class="flex gap-2 w-full md:w-auto justify-end"><button onclick="openResource('${d.id}','${i.url}','${i.title}')" class="flex-grow md:flex-none btn-brand px-10 py-3 rounded-2xl font-black text-[10px] uppercase">Access File</button>${isT ? `<button onclick="editR('${d.id}','${i.title}','${i.url}')" class="p-3 bg-zinc-800 text-white rounded-xl hover:text-brandBlue">✎</button><button onclick="delR('${d.id}')" class="p-3 bg-zinc-800 text-white rounded-xl hover:text-red-500">🗑</button>` : ''}</div></div>`;
        }
        
        window.delR = async (id) => { if(confirm("Confirm extraction removal?")) { await Core.deleteDoc(Core.doc(Core.db,"content",id)); loadHome(); } };
        window.editR = (id,t,u) => { document.getElementById('modal-content').innerHTML = `<h3 class="text-xl font-black mb-4 italic">Edit Content Properties</h3><input id="ed-t" value="${t}" class="input-field mb-2 text-xs"><input id="ed-u" value="${u}" class="input-field mb-4 text-xs"><button onclick="saveR('${id}')" class="w-full py-4 btn-brand text-xs">Save Configuration</button>`; document.getElementById('custom-modal').classList.remove('hidden'); };
        window.saveR = async (id) => { await Core.updateDoc(Core.doc(Core.db,"content",id), {title:document.getElementById('ed-t').value, url:document.getElementById('ed-u').value}); document.getElementById('custom-modal').classList.add('hidden'); loadHome(); };

        window.publishContent = async () => {
            const t = document.getElementById('up-t').value, u = document.getElementById('up-u').value, y = document.getElementById('up-y').value;
            if (!t || !u) return toast("Form paths nullified", "error");
            
            let payload = { title: t, url: u, type: y, tId: profile.teacherId, tName: profile.name, views: 0, date: Core.serverTimestamp() };
            
            if(y === 'live') {
                payload.liveDate = document.getElementById('up-date').value || new Date().toISOString().split('T')[0];
                payload.liveTime = document.getElementById('up-time').value || "00:00";
            }

            await Core.addDoc(Core.collection(Core.db, "content"), payload);
            toast("Asset uploaded onto chronological database map"); loadHome();
        };

        window.openGroupChat = async (id, name) => {
            activeGroupId = id; 
            document.getElementById('group-chat-window').classList.remove('hidden');
            document.getElementById('group-chat-title').innerText = name;
            
            const gDoc = await Core.getDoc(Core.doc(Core.db, "groups", id));
            const isAdmin = gDoc.exists() && gDoc.data().teacherId === profile.teacherId;
            const rosterBtn = document.getElementById('group-roster-btn');
            if(isAdmin) { rosterBtn.style.display="block"; rosterBtn.onclick=()=>manageGroupRoster(id, name); }
            else { rosterBtn.style.display="none"; }

            groupMessageTrackers[id] = 0; 
            
            const q = Core.query(Core.collection(Core.db, "groupMessages"), Core.where("groupId", "==", id), Core.orderBy("createdAt", "asc"));
            Core.onSnapshot(q, (snap) => {
                document.getElementById('group-chat-messages').innerHTML = snap.docs.map(m => {
                    const d = m.data(); const isM = d.senderId === Core.auth.currentUser.uid;
                    return `<div class="flex ${isM ? 'flex-row-reverse' : 'flex-row'} items-end gap-3"><img src="${d.senderPhoto || 'https://ui-avatars.com/api/?name='+d.sender}" class="w-8 h-8 rounded-full border border-white/10 object-cover"><div class="flex flex-col ${isM ? 'items-end' : 'items-start'}"><p class="text-[8px] opacity-40 uppercase font-black px-2 mb-1 text-zinc-500">${d.sender}</p><div class="inline-block p-4 rounded-2xl ${isM ? 'bg-brandOrange text-white' : 'bg-white/10'} text-sm shadow-xl">${d.text}</div></div></div>`;
                }).join('');
                document.getElementById('group-chat-messages').scrollTop = 99999;
            });
        };

        window.sendGroupMessage = async () => {
            const i = document.getElementById('group-message-input'), t = i.value.trim();
            if (!t || !activeGroupId) return;
            await Core.addDoc(Core.collection(Core.db, "groupMessages"), { groupId: activeGroupId, senderId: Core.auth.currentUser.uid, sender: profile.name, senderPhoto: profile.photo || '', text: t, createdAt: Core.serverTimestamp() });
            i.value = '';
        };

        // --- STABLE CHAT ARTIFICIAL INTELLIGENCE MATRIX (GEMINI-1.5-FLASH WITH FIXES) ---
        window.sendAIMessage = async () => {
            const i = document.getElementById('ai-input'), m = i.value.trim();
            if (!m) return;
            const chat = document.getElementById('ai-messages');
            chat.innerHTML += `<div class="ml-auto bg-brandOrange text-white p-4 rounded-2xl max-w-[80%] text-sm shadow-md">${m}</div>`;
            i.value = '';
            
            let videoIdentityPrompt = "No media context active.";
            if (currentVideoContext && currentVideoContext.link) {
                videoIdentityPrompt = `Active Media Resource: "${currentVideoContext.title}" URL: ${currentVideoContext.link}.`;
            }

            const context = `User: ${profile?.name}. Permission Tier: ${profile?.role}. Active Anchor: ${videoIdentityPrompt}`;
            
            try {
                // Correct JSON Payload Array Structure targeting the ultra-stable gemini-1.5-flash model endpoint
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${aiConfig.geminiKey}`, {
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        contents: [{ 
                            role: "user",
                            parts: [{ 
                                text: `${context} \nSystem Directive: You are the virtual teacher core assistant of the OpenClass LMS ecosystem. Respond intelligently.\nQuery: ${m}` 
                            }] 
                        }] 
                    })
                });
                const data = await response.json();
                const textReply = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="bg-white/10 p-4 rounded-2xl max-w-[80%] text-sm text-zinc-200 leading-relaxed">${textReply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { toast("AI Core handshake interruption", "error"); }
        };

        window.viewTeacher = async (tId) => {
            const main = document.getElementById('main-content');
            const [uS, cS, coS] = await Promise.all([Core.getDocs(Core.query(Core.collection(Core.db, "users"), Core.where("teacherId", "==", tId))), Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "==", tId))), Core.getDocs(Core.query(Core.collection(Core.db, "courses"), Core.where("teacherId", "==", tId)))]);
            if(uS.empty) return navigate('home');
            const tD = uS.docs[0].data(), isF = profile.subs?.includes(tId);
            
            const contentSorted = cS.docs.sort((a,b) => (b.data().date?.seconds || 0) - (a.data().date?.seconds || 0));
            const coursesSorted = coS.docs.sort((a,b) => (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0));

            main.innerHTML = `<div class="space-y-10"><div class="glass p-10 rounded-[4rem] border border-brandBlue/30 flex flex-col md:flex-row justify-between items-center gap-10 shadow-2xl"><div class="flex items-center gap-8"><img src="${tD.photo || 'https://ui-avatars.com/api/?name='+tD.name}" class="w-24 h-24 rounded-full border-4 border-brandBlue object-cover bg-brandBlue shadow-2xl"><div><h2 class="text-4xl font-black italic tracking-tighter">${tD.name}</h2><p class="text-sm font-bold text-brandBlue uppercase opacity-60">${tD.teacherId}</p></div></div><button onclick="handleSub('${tId}', ${isF})" class="px-10 py-4 ${isF ? 'bg-zinc-800' : 'btn-brand'} rounded-2xl font-black text-xs uppercase">${isF ? 'Unfollow Matrix' : 'Follow Instructor'}</button></div><h3 class="text-2xl font-black mb-6">Course Collections</h3><div id="courses-feed" class="grid md:grid-cols-2 gap-6 mb-10"></div><h3 class="text-2xl font-black mb-6">Syllabus Catalog Items</h3><div id="feed" class="space-y-4"></div></div>`;
            renderFeed(contentSorted, false); renderCourses(coursesSorted);
        };

        window.handleSub = async (tId, isF) => {
            await Core.updateDoc(Core.doc(Core.db, "users", Core.auth.currentUser.uid), { subs: isF ? Core.arrayRemove(tId) : Core.arrayUnion(tId) });
            profile.subs = isF ? profile.subs.filter(i => i !== tId) : [...(profile.subs||[]), tId];
            viewTeacher(tId);
        };

        Core.onAuthStateChanged(Core.auth, async (user) => {
            if (user) {
                const docSnap = await Core.getDoc(Core.doc(Core.db, "users", user.uid));
                if (!docSnap.exists()) showScreen('onboarding-screen');
                else {
                    profile = docSnap.data();
                    const pic = document.getElementById('nav-profile-pic');
                    if (profile.photo && pic) pic.innerHTML = `<img src="${profile.photo}" class="w-full h-full object-cover">`;
                    if (pic) pic.className = `w-10 h-10 rounded-full border-2 overflow-hidden hidden md:block ${profile.role === 'teacher' ? 'border-brandBlue' : 'border-brandOrange'}`;
                    showScreen('dashboard'); navigate(window.location.hash.substring(1) || 'home');
                    listenUnreadNotifications();
                }
            } else showScreen('auth-screen');
        });

        // --- NOTIFICATION STREAMS ---
        function listenUnreadNotifications() {
            Core.onSnapshot(Core.collection(Core.db, "groupMessages"), (snap) => {
                if(document.getElementById('group-chat-window').classList.contains('hidden') === false) {
                    if(activeGroupId) groupMessageTrackers[activeGroupId] = 0;
                }
                snap.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const msg = change.doc.data();
                        if (msg.groupId && msg.groupId !== activeGroupId && msg.senderId !== Core.auth.currentUser.uid) {
                            groupMessageTrackers[msg.groupId] = (groupMessageTrackers[msg.groupId] || 0) + 1;
                            updateNotificationUIBadge(msg.groupId);
                        }
                    }
                });
            });
        }

        function updateNotificationUIBadge(gid) {
            const el = document.getElementById(`badge-${gid}`);
            const count = groupMessageTrackers[gid] || 0;
            if(el) {
                if(count > 0) { el.innerText = count + " new"; el.classList.remove('hidden'); }
                else { el.classList.add('hidden'); }
            }
        }

        window.toggleAIChat = () => document.getElementById('ai-chat-window').classList.toggle('hidden');
        window.closeGroupChat = () => { document.getElementById('group-chat-window').classList.add('hidden'); activeGroupId = null; loadGroups(); };
        window.toggleMode = () => { document.documentElement.classList.toggle('light'); localStorage.setItem('oc_theme', document.documentElement.classList.contains('light')); };
        
        window.closeVault = () => { 
            document.getElementById('media-vault').classList.add('hidden'); 
            currentVideoContext = null; 
            if(window._disengageShields) window._disengageShields();
            if(videoPlayer) { try { videoPlayer.destroy(); } catch(e){} videoPlayer = null; } 
        };
        
        function showScreen(id) { ['auth-screen', 'verify-screen', 'onboarding-screen', 'dashboard'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function toast(m, type = "s") { const b = document.getElementById('toast-box'), d = document.createElement('div'); d.className = 'toast-pill'; if (type === "error") d.style.borderColor = "red"; d.innerText = m; b.appendChild(d); setTimeout(() => d.remove(), 2500); }
        if (localStorage.getItem('oc_theme') === 'true') document.documentElement.classList.add('light');

        async function loadGroups() {
            const container = document.getElementById('student-groups'); if (!container) return;
            const snap = await Core.getDocs(Core.query(Core.collection(Core.db, "groups")));
            
            container.innerHTML = snap.docs.filter(d => d.data().members?.includes(Core.auth.currentUser.uid) || d.data().teacherId === profile.teacherId).map(docSnap => {
                const g = docSnap.data();
                const unreadCount = groupMessageTrackers[docSnap.id] || 0;
                return `<div class="glass p-6 rounded-[2rem] flex justify-between items-center border border-white/5 hover:border-brandOrange/20 transition-all group"><div><span class="text-[9px] text-brandOrange font-black uppercase tracking-widest">${g.type}</span><div class="flex items-center gap-3"><h3 class="text-xl font-black">${g.name}</h3><span id="badge-${docSnap.id}" class="${unreadCount===0?'hidden':''} bg-brandOrange text-white text-[9px] font-extrabold px-2.5 py-0.5 rounded-full animate-bounce">${unreadCount} unread</span></div><p class="text-xs opacity-40">${g.code}</p></div><div class="flex gap-2"><button onclick="openGroupChat('${docSnap.id}', '${g.name}')" class="btn-brand px-6 py-2 text-[10px]">Open Sync Hub</button></div></div>`;
            }).join('');
        }

        function renderGroups(docs, isT) {
            const container = document.getElementById('student-groups') || document.getElementById('tab-display'); if(!container) return;
            container.innerHTML = `<div class="space-y-4">${docs.map(d => {
                const g = d.data();
                const unreadCount = groupMessageTrackers[d.id] || 0;
                return `<div class="glass p-6 rounded-[2rem] flex justify-between items-center group border border-white/5 hover:border-brandBlue/20 transition-all"><div><span class="text-[9px] text-brandBlue font-black uppercase tracking-widest">${g.type}</span><div class="flex items-center gap-3"><h3 class="text-xl font-black">${g.name}</h3><span id="badge-${d.id}" class="${unreadCount===0?'hidden':''} bg-brandBlue text-white text-[9px] font-extrabold px-2.5 py-0.5 rounded-full">${unreadCount}</span></div><p class="text-xs opacity-40">${g.code}</p></div><div class="flex gap-2"><button onclick="openGroupChat('${d.id}', '${g.name}')" class="btn-brand px-6 py-2 text-[10px]">Manage Pool</button><button onclick="delG('${d.id}')" class="bg-red-500/10 text-red-500 p-2 rounded-xl hover:bg-red-500 hover:text-white transition-all">🗑</button></div></div>`;
            }).join('')}</div>`;
        }
        window.delG = async (id) => { if(confirm("Confirm asset group dissolution?")) { await Core.deleteDoc(Core.doc(Core.db, "groups", id)); loadHome(); } };
        window.onclick = (e) => { if (e.target === document.getElementById('custom-modal')) document.getElementById('custom-modal').classList.add('hidden'); };
    </script>
</body>
</html>
