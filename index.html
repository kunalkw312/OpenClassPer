        // ===== Check Live Status =====
        function checkLiveStatus(date, start, end) {
            if (!date || !start) return 'recorded';
            const now = new Date();
            const startTime = new Date(`${date} ${start}`);
            const endTime = end ? new Date(`${date} ${end}`) : new Date(startTime.getTime() + 180 * 60000);
            if (now < startTime) return 'scheduled';
            if (now >= startTime && now <= endTime) return 'live';
            return 'recorded';
        }
        window.checkLiveStatus = checkLiveStatus;

        // ===== Group Chat =====
        window.openGroupChat = (id, name) => {
            activeGroupId = id;
            const window = document.getElementById('group-chat-window');
            window.classList.add('open');
            document.getElementById('group-chat-title').textContent = name;

            // Check if admin
            Core.getDoc(Core.doc(Core.db, 'groups', id)).then(doc => {
                if (doc.exists() && doc.data().teacherId === profile.teacherId) {
                    document.getElementById('group-roster-btn').style.display = 'block';
                } else {
                    document.getElementById('group-roster-btn').style.display = 'none';
                }
            });

            const q = Core.query(Core.collection(Core.db, 'groupMessages'), Core.where('groupId', '==', id), Core.orderBy('createdAt', 'asc'));
            Core.onSnapshot(q, (snap) => {
                const container = document.getElementById('group-chat-messages');
                container.innerHTML = snap.docs.map(d => {
                    const msg = d.data();
                    const isSelf = msg.senderId === uid();
                    return `
                        <div class="msg ${isSelf ? 'self' : 'other'}">
                            ${!isSelf ? `<p class="text-xs font-bold text-[var(--text-secondary)]">${msg.sender}</p>` : ''}
                            ${msg.text}
                        </div>
                    `;
                }).join('');
                container.scrollTop = container.scrollHeight;
            });
        };

        window.closeGroupChat = () => {
            document.getElementById('group-chat-window').classList.remove('open');
            activeGroupId = null;
        };

        window.sendGroupMessage = async () => {
            const input = document.getElementById('group-message-input');
            if (!input.value.trim() || !activeGroupId) return;
            const text = input.value.trim();
            input.value = '';
            try {
                await Core.addDoc(Core.collection(Core.db, 'groupMessages'), {
                    groupId: activeGroupId,
                    senderId: uid(),
                    sender: profile.name,
                    senderPhoto: profile.photo || '',
                    text,
                    createdAt: Core.serverTimestamp()
                });
            } catch (e) {
                toast('Failed to send message', 'error');
            }
        };

        // ===== AI Chat =====
        window.toggleAIChat = () => {
            const window = document.getElementById('ai-chat-window');
            window.classList.toggle('open');
            if (window.classList.contains('open')) {
                document.getElementById('ai-input').focus();
            }
        };

        window.sendAIMessage = async () => {
            const input = document.getElementById('ai-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            const container = document.getElementById('ai-messages');
            container.innerHTML += `<div class="user-msg">${text}</div>`;
            container.scrollTop = container.scrollHeight;

            // Simulate AI response (replace with actual API call)
            setTimeout(() => {
                container.innerHTML += `<div class="ai-msg">I'm your assistant. This is a demo response. Connect to your backend for real AI.</div>`;
                container.scrollTop = container.scrollHeight;
            }, 500);
        };

        // ===== Notifications =====
        window.showNotifications = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('open');
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Notifications</h2>
                <div id="notif-list" class="space-y-3">
                    ${notifications.length === 0 ? '<p class="text-[var(--text-secondary)]">No notifications</p>' :
                    notifications.map((n, i) => `
                        <div class="card flex items-center justify-between">
                            <div>
                                <p class="font-bold">${n.type}</p>
                                <p class="text-sm text-[var(--text-secondary)]">${n.text}</p>
                                <p class="text-xs text-[var(--text-muted)]">${n.time || 'Just now'}</p>
                            </div>
                            <button onclick="clearNotification(${i})" class="text-red-500 text-sm">✕</button>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        window.clearNotification = (index) => {
            notifications.splice(index, 1);
            showNotifications();
            updateNotifyBadge();
        };

        window.pushNotification = (type, text) => {
            notifications.unshift({ type, text, time: new Date().toLocaleTimeString() });
            updateNotifyBadge();
            toast(`🔔 ${type}: ${text}`);
        };

        function updateNotifyBadge() {
            const pill = document.getElementById('notify-pill');
            if (notifications.length > 0) {
                pill.textContent = notifications.length;
                pill.classList.remove('hidden');
            } else {
                pill.classList.add('hidden');
            }
        }

        // ===== Profile Settings =====
        window.showProfileSettings = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('open');
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Profile Settings</h2>
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <img src="${profile.photo || 'https://ui-avatars.com/api/?name=' + profile.name}" class="w-16 h-16 rounded-full object-cover">
                        <div>
                            <p class="font-bold">${profile.name}</p>
                            <p class="text-sm text-[var(--text-secondary)]">${profile.email}</p>
                        </div>
                    </div>
                    <input id="profile-name" value="${profile.name}" placeholder="Full Name" class="input-field">
                    <textarea id="profile-bio" placeholder="Bio" class="input-field h-20">${profile.bio || ''}</textarea>
                    <input id="profile-photo" value="${profile.photo || ''}" placeholder="Photo URL" class="input-field">
                    <button onclick="saveProfile()" class="w-full btn-primary">Save Changes</button>
                    <button onclick="logout()" class="w-full btn-secondary">Sign Out</button>
                </div>
            `;
        };

        window.saveProfile = async () => {
            const name = document.getElementById('profile-name').value;
            const bio = document.getElementById('profile-bio').value;
            const photo = document.getElementById('profile-photo').value;
            try {
                await Core.updateDoc(Core.doc(Core.db, 'users', uid()), { name, bio, photo });
                toast('Profile updated!');
                document.getElementById('custom-modal').classList.remove('open');
                profile.name = name;
                profile.bio = bio;
                profile.photo = photo;
                updateNavProfile();
            } catch (e) {
                toast('Failed to update profile', 'error');
            }
        };

        // ===== Plan Management (Owner) =====
        window.showPlanManagement = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('open');
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Plan Management</h2>
                <p class="text-[var(--text-secondary)] text-sm mb-4">Configure subscription plans for your institute</p>
                <div class="space-y-4">
                    <div class="card">
                        <h3 class="font-bold">Demo Plan</h3>
                        <p class="text-sm text-[var(--text-secondary)]">Free preview access</p>
                        <button class="btn-secondary text-sm mt-2" onclick="editPlan('demo')">Configure</button>
                    </div>
                    <div class="card">
                        <h3 class="font-bold">Full Access Plan</h3>
                        <p class="text-sm text-[var(--text-secondary)]">Complete content access</p>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-brandOrange font-bold">₹</span>
                            <input id="plan-price" type="number" placeholder="Price" class="input-field w-32" value="499">
                            <span class="text-sm text-[var(--text-secondary)]">/ month</span>
                        </div>
                        <button class="btn-primary text-sm mt-2" onclick="savePlan()">Save Plan</button>
                    </div>
                </div>
            `;
        };

        window.savePlan = async () => {
            const price = document.getElementById('plan-price').value;
            if (!price) return toast('Enter a price', 'error');
            // Save to Firestore (plans collection)
            try {
                const snap = await Core.getDocs(Core.query(Core.collection(Core.db, 'plans'), Core.where('instituteId', '==', profile.instituteId)));
                if (snap.empty) {
                    await Core.addDoc(Core.collection(Core.db, 'plans'), {
                        instituteId: profile.instituteId,
                        type: 'full',
                        price: Number(price),
                        duration: 'monthly',
                        createdAt: Core.serverTimestamp()
                    });
                } else {
                    await Core.updateDoc(snap.docs[0].ref, { price: Number(price) });
                }
                toast('Plan updated!');
                document.getElementById('custom-modal').classList.remove('open');
            } catch (e) {
                toast('Failed to save plan', 'error');
            }
        };

        // ===== Schedule Manager (Teacher) =====
        window.showScheduleManager = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('open');
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Schedule Manager</h2>
                <p class="text-[var(--text-secondary)] text-sm mb-4">Schedule live sessions and events</p>
                <div class="space-y-4">
                    <input type="text" id="schedule-title" placeholder="Event Title" class="input-field">
                    <input type="date" id="schedule-date" class="input-field">
                    <input type="time" id="schedule-start" class="input-field">
                    <input type="time" id="schedule-end" class="input-field">
                    <button onclick="createSchedule()" class="w-full btn-primary">Create Schedule</button>
                    <div id="schedule-list" class="space-y-2 mt-4"></div>
                </div>
            `;
            loadSchedules();
        };

        async function loadSchedules() {
            try {
                const snap = await Core.getDocs(Core.query(Core.collection(Core.db, 'schedules'), Core.where('teacherId', '==', profile.teacherId)));
                const container = document.getElementById('schedule-list');
                if (snap.empty) {
                    container.innerHTML = '<p class="text-[var(--text-secondary)] text-sm">No schedules yet</p>';
                } else {
                    container.innerHTML = snap.docs.map(d => {
                        const data = d.data();
                        return `
                            <div class="card flex items-center justify-between">
                                <div>
                                    <p class="font-bold">${data.title}</p>
                                    <p class="text-sm text-[var(--text-secondary)]">${data.date} at ${data.start}</p>
                                </div>
                                <button onclick="deleteSchedule('${d.id}')" class="text-red-500 text-sm">✕</button>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {}
        }

        window.createSchedule = async () => {
            const title = document.getElementById('schedule-title').value;
            const date = document.getElementById('schedule-date').value;
            const start = document.getElementById('schedule-start').value;
            const end = document.getElementById('schedule-end').value;
            if (!title || !date || !start) return toast('Fill in all fields', 'error');
            try {
                await Core.addDoc(Core.collection(Core.db, 'schedules'), {
                    title,
                    date,
                    start,
                    end,
                    teacherId: profile.teacherId,
                    teacherName: profile.name,
                    createdAt: Core.serverTimestamp()
                });
                toast('Schedule created!');
                showScheduleManager();
            } catch (e) {
                toast('Failed to create schedule', 'error');
            }
        };

        window.deleteSchedule = async (id) => {
            try {
                await Core.deleteDoc(Core.doc(Core.db, 'schedules', id));
                toast('Schedule deleted');
                showScheduleManager();
            } catch (e) {
                toast('Failed to delete', 'error');
            }
        };

        // ===== Purchase Modal =====
        window.showPurchaseModal = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('open');
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Choose Your Plan</h2>
                <div class="space-y-4">
                    <div class="card hover:border-brandOrange/30">
                        <h3 class="font-bold">Demo Access</h3>
                        <p class="text-sm text-[var(--text-secondary)]">Free • Limited content</p>
                        <button class="btn-secondary text-sm mt-2" onclick="selectPlan('demo')">Select</button>
                    </div>
                    <div class="card hover:border-brandOrange/30 border-brandOrange/30">
                        <h3 class="font-bold">Full Access</h3>
                        <p class="text-sm text-[var(--text-secondary)]">₹499 / month • All content</p>
                        <button class="btn-primary text-sm mt-2" onclick="selectPlan('full')">Purchase</button>
                    </div>
                </div>
            `;
        };

        window.selectPlan = (plan) => {
            if (plan === 'demo') {
                hasFullAccess = false;
                toast('Demo access activated!');
                document.getElementById('custom-modal').classList.remove('open');
                renderContent('home');
                return;
            }

            // Simulate payment flow
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Complete Purchase</h2>
                <div class="card mb-4">
                    <p class="font-bold">Full Access Plan</p>
                    <p class="text-2xl font-bold text-brandOrange">₹499 / month</p>
                </div>
                <div class="space-y-3">
                    <div class="card">
                        <label class="flex items-center gap-2">
                            <input type="radio" name="payment" checked>
                            <span>Card Payment</span>
                        </label>
                    </div>
                    <div class="card">
                        <label class="flex items-center gap-2">
                            <input type="radio" name="payment">
                            <span>UPI</span>
                        </label>
                    </div>
                    <button onclick="completePurchase()" class="w-full btn-primary">Confirm Purchase</button>
                </div>
            `;
        };

        window.completePurchase = async () => {
            try {
                // Update user plan
                await Core.updateDoc(Core.doc(Core.db, 'users', uid()), {
                    hasPlan: true,
                    planType: 'full',
                    planExpiry: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString()
                });
                hasFullAccess = true;
                toast('Purchase successful! Full access granted.');
                document.getElementById('custom-modal').classList.remove('open');
                renderContent('home');
            } catch (e) {
                toast('Purchase failed', 'error');
            }
        };

        // ===== Ads System =====
        function renderAds() {
            // Banner ads
            const gallery = document.getElementById('ad-gallery');
            if (ads.length > 0) {
                gallery.style.display = 'flex';
                gallery.innerHTML = ads.map(ad => `
                    <div class="ad-slide">
                        <img src="${ad.image || 'https://via.placeholder.com/200x100/004a80/ffffff?text=Ad'}" alt="Ad">
                        <p>${ad.title || 'Sponsored'}</p>
                        <small class="text-[var(--text-muted)] text-xs">${ad.subtext || ''}</small>
                    </div>
                `).join('');
            } else {
                gallery.style.display = 'none';
            }

            // Popup ad
            const banner = document.getElementById('ad-banner');
            if (ads.length > 0) {
                const ad = ads[0];
                document.getElementById('ad-banner-img').src = ad.image || 'https://via.placeholder.com/100x100/004a80/ffffff?text=Ad';
                document.getElementById('ad-banner-title').textContent = ad.title || 'Special Offer';
                document.getElementById('ad-banner-sub').textContent = ad.subtext || '';
                banner.style.display = 'flex';
                // Auto-hide after 10 seconds
                setTimeout(() => { banner.style.display = 'none'; }, 10000);
            }
        }

        window.closeAdBanner = () => {
            document.getElementById('ad-banner').style.display = 'none';
        };

        window.handleAdClick = () => {
            toast('Ad clicked! (Simulated)');
        };

        // ===== Load Ads =====
        async function loadAds() {
            if (!isOwner) return;
            try {
                const snap = await Core.getDocs(Core.query(Core.collection(Core.db, 'ads'), Core.where('instituteId', '==', profile.instituteId)));
                ads = [];
                snap.forEach(d => ads.push(d.data()));
                renderAds();
            } catch (e) {}
        }

        // ===== Helper Functions =====
        function updateNavProfile() {
            const pic = document.getElementById('nav-profile-pic');
            if (pic && profile) {
                pic.innerHTML = `<img src="${profile.photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(profile.name)}" class="w-full h-full object-cover">`;
            }
        }

        window.toggleSearch = () => {
            const query = prompt('Search for content, courses, or teachers:');
            if (query && query.trim()) {
                navigate('search', query.trim());
            }
        };

        // ===== Auth Listener =====
        Core.onAuthStateChanged(Core.auth, async (user) => {
            if (user) {
                const docSnap = await Core.getDoc(Core.doc(Core.db, 'users', user.uid));
                if (!docSnap.exists()) {
                    showScreen('onboarding-screen');
                    return;
                }
                profile = docSnap.data();
                isTeacher = profile.role === 'teacher';
                isOwner = profile.role === 'owner';
                isSuperAdmin = profile.role === 'super_admin';
                isStudent = profile.role === 'student';
                hasFullAccess = profile.hasPlan || false;

                // Check if student has demo-only access (no plan but has demo content)
                if (isStudent && !hasFullAccess) {
                    // Check if any demo content exists
                    const demoSnap = await Core.getDocs(Core.query(Core.collection(Core.db, 'content'), Core.where('isDemo', '==', true)));
                    if (!demoSnap.empty) {
                        // Student can see demo content but not full
                    }
                }

                updateNavProfile();

                // Update nav buttons
                if (isTeacher || isOwner || isSuperAdmin) {
                    document.querySelector('.nav-btn[data-tab="analytics"]').classList.remove('hidden');
                    // Rename tabs for teacher
                    document.querySelector('.nav-btn[data-tab="home"] span').textContent = 'Dashboard';
                    document.querySelector('.nav-btn[data-tab="content"] span').textContent = 'Content';
                } else {
                    document.querySelector('.nav-btn[data-tab="analytics"]').classList.add('hidden');
                    document.querySelector('.nav-btn[data-tab="home"] span').textContent = 'Home';
                    document.querySelector('.nav-btn[data-tab="content"] span').textContent = 'Content';
                }

                showScreen('dashboard');
                renderContent('home');

                // Load ads if owner
                if (isOwner) loadAds();

                // Listen for notifications
                // (Simplified: we'll just push demo notifications)
                setTimeout(() => {
                    if (isTeacher) pushNotification('Welcome', 'You can now create content and manage your courses.');
                }, 1000);

            } else {
                showScreen('auth-screen');
            }
        });

        // ===== Initial Load =====
        console.log('OpenClase v2.0 - Monkey-Simple UI');
        console.log('Design by Senior Full-Stack Developer');
    </script>
</body>

</html>
