<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link id="app-manifest" rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('PWA Registered'))
                    .catch(err => console.error('SW Registration Failed:', err));
            });
        }
    </script>

    <title>OpenClase | Premium SaaS LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#004a80',
                        brandOrange: '#f7941d',
                        brandDark: '#0a0a0a',
                        brandGray: '#1a1a1a',
                        brandCard: '#141414',
                        brandBorder: 'rgba(255,255,255,0.06)'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* ===== Reset & Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #161616;
            --bg-input: #1a1a1a;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow-glow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        .light {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f0f0f0;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border-color: rgba(0, 0, 0, 0.06);
            --shadow-glow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        html,
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--brandOrange);
            border-radius: 10px;
        }

        /* ===== Glass ===== */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-glow);
        }

        .glass-light {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
        }

        /* ===== Buttons ===== */
        .btn-primary {
            background: linear-gradient(135deg, #004a80 0%, #f7941d 100%);
            color: white !important;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(247, 148, 29, 0.25);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            font-weight: 600;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
        }
        .btn-secondary:hover {
            background: var(--brandOrange);
            color: white;
            border-color: var(--brandOrange);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .btn-ghost:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        /* ===== Inputs ===== */
        .input-field {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            width: 100%;
            outline: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .input-field:focus {
            border-color: var(--brandOrange);
            box-shadow: 0 0 0 3px rgba(247, 148, 29, 0.1);
        }
        .input-field::placeholder {
            color: var(--text-muted);
        }

        /* ===== Navigation Island ===== */
        #nav-island {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5000;
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            width: calc(100% - 32px);
            max-width: 480px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #nav-island.nav-hidden {
            transform: translate(-50%, 120px);
            opacity: 0;
            pointer-events: none;
        }
        .nav-btn {
            flex: 1;
            padding: 10px 8px;
            border-radius: 100px;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s ease;
            cursor: pointer;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .nav-btn i {
            font-size: 18px;
            transition: all 0.3s ease;
        }
        .nav-btn span {
            font-size: 9px;
            opacity: 0.7;
        }
        .nav-btn.active {
            color: white;
            background: linear-gradient(135deg, #004a80, #f7941d);
        }
        .nav-btn.active i {
            transform: scale(1.1);
        }
        .nav-btn:hover:not(.active) {
            color: var(--text-primary);
            background: var(--bg-input);
        }

        /* ===== Cards ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: rgba(247, 148, 29, 0.2);
            transform: translateY(-2px);
        }

        .card-skeleton {
            animation: shimmer 1.5s ease-in-out infinite;
            background: linear-gradient(90deg, var(--bg-input) 25%, var(--bg-card) 50%, var(--bg-input) 75%);
            background-size: 200% 100%;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ===== Toast ===== */
        #toast-box {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            width: calc(100% - 32px);
            max-width: 400px;
        }
        .toast-pill {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 100px;
            border: 1px solid var(--border-color);
            font-size: 13px;
            font-weight: 500;
            animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
            text-align: center;
        }
        .toast-pill.error {
            border-color: #ef4444;
            color: #ef4444;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== Modal ===== */
        #custom-modal {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: modalFade 0.3s ease;
        }
        #custom-modal.open {
            display: flex;
        }
        #modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlide 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ===== Ad Banner ===== */
        #ad-banner {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4000;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px 20px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-width: 90%;
            width: 400px;
            backdrop-filter: blur(20px);
        }
        #ad-banner .ad-close {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }
        #ad-banner .ad-close:hover {
            background: #ef4444;
            color: white;
        }
        #ad-banner img {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            object-fit: cover;
        }
        #ad-banner .ad-text {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
        }
        #ad-banner .ad-text small {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ===== Ad Gallery ===== */
        #ad-gallery {
            display: none;
            gap: 12px;
            overflow-x: auto;
            padding: 12px 0;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        #ad-gallery .ad-slide {
            flex: 0 0 200px;
            scroll-snap-align: start;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }
        #ad-gallery .ad-slide img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }
        #ad-gallery .ad-slide p {
            font-size: 12px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .card {
                padding: 16px;
            }
            #modal-content {
                padding: 16px;
                margin: 8px;
            }
            #nav-island {
                padding: 4px 8px;
                bottom: 16px;
            }
            .nav-btn {
                padding: 8px 4px;
                font-size: 10px;
            }
            .nav-btn i {
                font-size: 16px;
            }
            .nav-btn span {
                font-size: 8px;
            }
            #ad-banner {
                bottom: 80px;
                width: 92%;
                padding: 10px 16px;
            }
            #ad-banner img {
                width: 40px;
                height: 40px;
            }
            #ad-gallery .ad-slide {
                flex: 0 0 140px;
            }
            #ad-gallery .ad-slide img {
                height: 80px;
            }
        }

        /* ===== Misc ===== */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ring-glow {
            box-shadow: 0 0 0 2px var(--bg-primary), 0 0 0 4px var(--brandOrange);
        }

        .truncate-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .badge-demo {
            background: rgba(247, 148, 29, 0.15);
            color: var(--brandOrange);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-live {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        .badge-live::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .badge-scheduled {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== Vault ===== */
        #media-vault {
            position: fixed;
            inset: 0;
            z-index: 20000;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        #media-vault.open {
            display: flex;
        }
        #vault-wrapper {
            width: 100%;
            max-width: 900px;
            height: 80vh;
            max-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
        }
        #vault-wrapper .plyr {
            width: 100%;
            border-radius: var(--radius-md);
        }
        #vault-wrapper .plyr video {
            max-height: 85vh;
            object-fit: contain;
        }
        #vault-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2147483647;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: none;
        }
        #vault-close-btn:hover {
            background: #ef4444;
            transform: scale(1.1);
        }

        #anti-theft-blank {
            display: none;
            position: absolute;
            inset: 0;
            background: #000 !important;
            z-index: 2147483647 !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff !important;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.1em;
            pointer-events: auto !important;
        }

        #secure-watermark {
            position: absolute;
            z-index: 2147483646 !important;
            pointer-events: none !important;
            font-weight: 700;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.08) !important;
            mix-blend-mode: difference !important;
            white-space: nowrap;
            user-select: none;
            transition: all 1.2s ease-in-out;
        }

        /* ===== Chat ===== */
        #live-classroom-chat-container {
            display: none;
            width: 100%;
            max-width: 360px;
            height: 300px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            flex-direction: column;
            overflow: hidden;
            margin-top: 12px;
        }
        #live-classroom-chat-container.open {
            display: flex;
        }
        #live-chat-messages-target {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #live-chat-input-row {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-input);
        }
        #live-chat-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
            font-size: 13px;
        }
        #live-chat-input-row input::placeholder {
            color: var(--text-muted);
        }
        #live-chat-input-row button {
            background: var(--brandOrange);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #live-chat-input-row button:hover {
            transform: scale(1.05);
        }

        /* ===== Group Chat ===== */
        #group-chat-window {
            position: fixed;
            inset: 0;
            z-index: 6000;
            background: var(--bg-primary);
            display: none;
            flex-direction: column;
        }
        #group-chat-window.open {
            display: flex;
        }
        #group-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #group-chat-messages .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            line-height: 1.5;
        }
        #group-chat-messages .msg.self {
            align-self: flex-end;
            background: var(--brandOrange);
            color: white;
        }
        #group-chat-messages .msg.other {
            align-self: flex-start;
            background: var(--bg-input);
            color: var(--text-primary);
        }

        /* ===== AI Chat ===== */
        #ai-floating-btn {
            position: fixed;
            bottom: 100px;
            right: 16px;
            z-index: 5000;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #004a80, #f7941d);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(247, 148, 29, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #ai-floating-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(247, 148, 29, 0.4);
        }
        #ai-chat-window {
            position: fixed;
            bottom: 100px;
            right: 16px;
            z-index: 5000;
            width: calc(100% - 32px);
            max-width: 400px;
            height: 500px;
            max-height: 70vh;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: modalSlide 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #ai-chat-window.open {
            display: flex;
        }
        #ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #ai-messages .ai-msg {
            background: var(--bg-input);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            max-width: 85%;
            font-size: 13px;
            line-height: 1.5;
            align-self: flex-start;
        }
        #ai-messages .user-msg {
            background: var(--brandOrange);
            color: white;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            max-width: 85%;
            font-size: 13px;
            line-height: 1.5;
            align-self: flex-end;
        }

        /* ===== Live Chat Badge ===== */
        #live-chat-status-badge {
            font-size: 9px;
            opacity: 0.5;
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <!-- ===== Toast ===== -->
    <div id="toast-box"></div>

    <!-- ===== Custom Modal ===== -->
    <div id="custom-modal">
        <div id="modal-content"></div>
    </div>

    <!-- ===== Media Vault ===== -->
    <div id="media-vault">

    <div id="group-chat-window">

                <button class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] text-xl" onclick="closeGroupChat()">←</button>
                <h2 id="group-chat-title" class="text-xl font-bold">Group</h2>
                <button id="group-roster-btn" class="text-xs font-bold text-brandOrange border border-brandOrange/20 px-3 py-1 rounded-lg hover:bg-brandOrange hover:text-white transition">Members</button>
            </div>
            <button onclick="closeGroupChat()" class="text-2xl w-10 h-10 flex items-center justify-center bg-[var(--bg-input)] rounded-full hover:bg-red-500 hover:text-white transition">✕</button>
        </div>
        <div id="group-chat-messages"></div>
        <div class="p-4 flex gap-3 border-t border-[var(--border-color)] bg-[var(--bg-input)]">
            <input id="group-message-input" class="input-field" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendGroupMessage()">
            <button onclick="sendGroupMessage()" class="btn-primary">Send</button>
        </div>
    </div>

    <!-- ===== AI Chat ===== -->
    <button id="ai-floating-btn" onclick="toggleAIChat()">
        <i class="fas fa-robot"></i>
    </button>
    <div id="ai-chat-window">
        <div class="p-4 border-b border-[var(--border-color)] flex justify-between items-center bg-[var(--bg-input)]">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-brandOrange flex items-center justify-center text-white font-bold">AI</div>
                <div>
                    <h3 class="font-bold text-sm">Class Assistant</h3>
                    <p class="text-[9px] text-brandOrange font-bold">ONLINE</p>
                </div>
            </div>
            <button onclick="toggleAIChat()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[var(--border-color)] transition">✕</button>
        </div>
        <div id="ai-messages"></div>
        <div class="p-4 border-t border-[var(--border-color)] bg-[var(--bg-input)]">
            <div class="flex gap-2">
                <input id="ai-input" type="text" placeholder="Ask anything..." class="input-field" onkeydown="if(event.key==='Enter') sendAIMessage()">
                <button onclick="sendAIMessage()" class="btn-primary px-6">Send</button>
            </div>
        </div>
    </div>

    <!-- ===== Ad Banner (Pop-up) ===== -->
    <div id="ad-banner">
        <button class="ad-close" onclick="closeAdBanner()">✕</button>
        <img id="ad-banner-img" src="" alt="Ad">
        <div class="ad-text">
            <span id="ad-banner-title">Special Offer</span>
            <small id="ad-banner-sub">Limited time deal</small>
        </div>
        <button class="btn-primary text-xs px-4 py-2" onclick="handleAdClick()">Learn More</button>
    </div>

    <!-- ===== Main App ===== -->
    <div id="app">
        <!-- ===== Auth Screen ===== -->
        <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md glass p-8 rounded-[2rem] text-center">
                <img id="auth-logo" src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-16 mx-auto mb-4 rounded-2xl object-cover">
                <h1 class="text-3xl font-bold mb-6">Open<span class="text-brandOrange">Clase</span></h1>

                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                    <input type="text" id="reg-institute-id" placeholder="Institute ID (Optional)" class="input-field">
                </div>

                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field" onkeydown="if(event.key==='Enter') handleAuth()">
                    <button onclick="handleAuth()" id="primary-auth-btn" class="w-full btn-primary">Sign In</button>
                    <button onclick="handleGoogle()" class="w-full btn-secondary flex items-center justify-center gap-3">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Continue with Google
                    </button>
                    <div class="flex justify-between items-center mt-4 text-sm">
                        <button onclick="toggleAuth()" id="toggle-auth-btn" class="text-[var(--text-secondary)] hover:text-brandOrange">Create Account</button>
                        <button onclick="forgotPassword()" class="text-[var(--text-secondary)] hover:text-brandOrange">Forgot Password?</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== Verify Screen ===== -->
        <div id="verify-screen" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md glass p-8 rounded-[2rem] text-center">
                <h2 class="text-2xl font-bold mb-2">Verify Email</h2>
                <p id="verify-note" class="text-[var(--text-secondary)] text-sm mb-6">Enter the code sent to your email</p>
                <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-3xl font-bold tracking-widest mb-6">
                <button onclick="checkOTP()" class="w-full btn-primary">Verify</button>
            </div>
        </div>

        <!-- ===== Onboarding Screen ===== -->
        <div id="onboarding-screen" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md glass p-8 rounded-[2rem] text-center">
                <h2 class="text-2xl font-bold mb-6">Complete Profile</h2>
                <div class="space-y-4">
                    <input type="text" id="ob-name" placeholder="Full Name" class="input-field">
                    <select id="ob-role" class="input-field">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                    <input type="password" id="ob-pass" placeholder="Create Password" class="input-field">
                    <button onclick="finalizeProfile()" class="w-full btn-primary">Activate Account</button>
                </div>
            </div>
        </div>

        <!-- ===== Dashboard ===== -->
        <div id="dashboard" class="hidden min-h-screen pb-32">
            <!-- ===== Navbar ===== -->
            <nav class="sticky top-0 z-40 glass border-b border-[var(--border-color)] p-4 flex items-center justify-between">
                <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-8 w-8 rounded-xl object-cover">
                    <span class="text-xl font-bold hidden sm:block">Open<span class="text-brandOrange">Clase</span></span>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleSearch()" class="w-9 h-9 rounded-xl glass flex items-center justify-center text-[var(--text-secondary)] hover:text-[var(--text-primary)]">
                        <i class="fas fa-search"></i>
                    </button>
                    <button onclick="showNotifications()" class="w-9 h-9 rounded-xl glass flex items-center justify-center relative">
                        <i class="fas fa-bell"></i>
                        <span id="notify-pill" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
                    </button>
                    <button onclick="toggleMode()" class="w-9 h-9 rounded-xl glass flex items-center justify-center">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div id="nav-profile-pic" onclick="showProfileSettings()" class="w-9 h-9 rounded-full overflow-hidden cursor-pointer ring-2 ring-brandOrange/30">
                        <img src="" alt="Profile" class="w-full h-full object-cover">
                    </div>
                </div>
            </nav>

            <!-- ===== Ad Gallery (Banner Ads) ===== -->
            <div id="ad-gallery" class="px-4 mt-4"></div>

            <!-- ===== Main Content ===== -->
            <main id="main-content" class="p-4 max-w-7xl mx-auto"></main>

            <!-- ===== Navigation Island ===== -->
            <div id="nav-island">
                <button class="nav-btn active" data-tab="home" onclick="setTab('home')">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </button>
                <button class="nav-btn" data-tab="groups" onclick="setTab('groups')">
                    <i class="fas fa-users"></i>
                    <span>Groups</span>
                </button>
                <button class="nav-btn" data-tab="courses" onclick="setTab('courses')">
                    <i class="fas fa-book"></i>
                    <span>Courses</span>
                </button>
                <button class="nav-btn" data-tab="content" onclick="setTab('content')">
                    <i class="fas fa-grid-2"></i>
                    <span>Content</span>
                </button>
                <!-- Dynamic: Analytics (Teacher only) -->
                <button class="nav-btn hidden" data-tab="analytics" onclick="setTab('analytics')">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ===== Scripts ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
            }
        }
    </script>
    <script type="module">
        import * as Core from "./app.js";

        // ===== Global State =====
        let profile = null;
        let isSignup = false;
        let otpCode = null;
        let tempUser = null;
        let activeGroupId = null;
        let currentTab = 'home';
        let videoPlayer = null;
        let currentVideoContext = null;
        let watermarkInterval = null;
        let activeLiveChatListener = null;
        let cart = [];
        let notifications = [];
        let ads = [];
        let isTeacher = false;
        let isOwner = false;
        let isSuperAdmin = false;
        let isStudent = false;
        let hasFullAccess = false; // For student: purchased plan or demo-only

        const uid = () => Core.auth.currentUser?.uid;

        // ===== Toast =====
        window.toast = function(msg, type = 'info') {
            const box = document.getElementById('toast-box');
            const el = document.createElement('div');
            el.className = 'toast-pill' + (type === 'error' ? ' error' : '');
            el.textContent = msg;
            box.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        };

        // ===== Auth =====
        window.toggleAuth = () => {
            isSignup = !isSignup;
            const fields = document.getElementById('signup-fields');
            fields.classList.toggle('hidden');
            document.getElementById('primary-auth-btn').textContent = isSignup ? 'Create Account' : 'Sign In';
            document.getElementById('toggle-auth-btn').textContent = isSignup ? 'Back to Sign In' : 'Create Account';
        };

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if (!email || !pass) return toast('Please fill in all fields', 'error');

            if (isSignup) {
                const name = document.getElementById('reg-name').value;
                const role = document.getElementById('reg-role').value;
                const instId = document.getElementById('reg-institute-id').value.trim() || null;
                if (!name) return toast('Please enter your name', 'error');

                tempUser = { email, pass, name, role, instId };
                otpCode = Math.floor(100000 + Math.random() * 900000);
                try {
                    await Core.sendOTP(email, otpCode);
                    document.getElementById('verify-note').textContent = `Code sent to ${email}`;
                    showScreen('verify-screen');
                } catch (e) {
                    toast('Failed to send verification code', 'error');
                }
            } else {
                try {
                    await Core.signInWithEmailAndPassword(Core.auth, email, pass);
                } catch (e) {
                    toast('Invalid credentials', 'error');
                }
            }
        };

        window.checkOTP = async () => {
            const input = document.getElementById('otp-input').value;
            if (input != otpCode) return toast('Invalid code', 'error');

            try {
                const { email, pass, name, role, instId } = tempUser;
                const cred = await Core.createUserWithEmailAndPassword(Core.auth, email, pass);
                const userData = {
                    name,
                    role,
                    email,
                    instituteId: instId,
                    photo: '',
                    bio: '',
                    subs: [],
                    pendingSubs: [],
                    joined: new Date().toISOString(),
                    privacyMode: 'public',
                    hasPlan: false,
                    planType: null,
                    planExpiry: null
                };
                if (role === 'teacher') {
                    userData.teacherId = 'OC-' + name.split(' ')[0].toUpperCase() + Math.floor(100 + Math.random() * 899);
                }
                await Core.setDoc(Core.doc(Core.db, 'users', cred.user.uid), userData);
                location.reload();
            } catch (e) {
                toast(e.message, 'error');
            }
        };

        window.handleGoogle = () => {
            Core.signInWithPopup(Core.auth, Core.provider).catch(e => {
                if (e.code !== 'auth/popup-closed-by-user') toast(e.message, 'error');
            });
        };

        window.forgotPassword = () => {
            const email = document.getElementById('auth-email').value;
            if (!email) return toast('Enter your email first', 'error');
            Core.sendPasswordResetEmail(Core.auth, email).then(() => {
                toast('Password reset email sent');
            }).catch(() => toast('Failed to send reset email', 'error'));
        };

        window.finalizeProfile = async () => {
            const name = document.getElementById('ob-name').value;
            const pass = document.getElementById('ob-pass').value;
            const role = document.getElementById('ob-role').value;
            if (!name || !pass) return toast('Fill all fields', 'error');

            try {
                await Core.updatePassword(Core.auth.currentUser, pass);
                await Core.setDoc(Core.doc(Core.db, 'users', uid()), {
                    name,
                    role,
                    email: Core.auth.currentUser.email,
                    photo: '',
                    bio: '',
                    subs: [],
                    pendingSubs: [],
                    joined: new Date().toISOString(),
                    privacyMode: 'public',
                    hasPlan: false,
                    planType: null,
                    planExpiry: null,
                    ...(role === 'teacher' ? { teacherId: 'OC-' + name.split(' ')[0].toUpperCase() + Math.floor(100 + Math.random() * 899) } : {})
                });
                location.reload();
            } catch (e) {
                toast(e.message, 'error');
            }
        };

        window.logout = () => {
            Core.signOut(Core.auth).then(() => location.reload());
        };

        // ===== Screen Management =====
        function showScreen(id) {
            ['auth-screen', 'verify-screen', 'onboarding-screen', 'dashboard'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }
        window.showScreen = showScreen;

        // ===== Theme =====
        window.toggleMode = () => {
            document.documentElement.classList.toggle('light');
            localStorage.setItem('oc_theme', document.documentElement.classList.contains('light'));
        };
        if (localStorage.getItem('oc_theme') === 'true') document.documentElement.classList.add('light');

        // ===== Navigation =====
        window.setTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.nav-btn[data-tab="${tab}"]`);
            if (btn) btn.classList.add('active');
            navigate(tab);
        };

        window.navigate = (page, query = '') => {
            history.pushState({ page, query }, '', `#${page}`);
            renderContent(page, query);
        };

        window.onpopstate = (e) => {
            if (e.state) renderContent(e.state.page, e.state.query || '');
        };

        // ===== Render Content =====
        async function renderContent(page, query = '') {
            const main = document.getElementById('main-content');
            if (!profile) return;

            // Show skeleton
            main.innerHTML = `
                <div class="space-y-4">
                    <div class="card-skeleton h-32 rounded-2xl"></div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="card-skeleton h-24 rounded-2xl"></div>
                        <div class="card-skeleton h-24 rounded-2xl"></div>
                        <div class="card-skeleton h-24 rounded-2xl"></div>
                        <div class="card-skeleton h-24 rounded-2xl"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="card-skeleton h-40 rounded-2xl"></div>
                        <div class="card-skeleton h-40 rounded-2xl"></div>
                        <div class="card-skeleton h-40 rounded-2xl"></div>
                    </div>
                </div>
            `;

            if (page === 'home') await renderHome();
            else if (page === 'groups') await renderGroups();
            else if (page === 'courses') await renderCourses();
            else if (page === 'content') await renderContentTab();
            else if (page === 'analytics') await renderAnalytics();
            else if (page === 'search') await renderSearch(query);
            else if (page === 'profile') await renderTeacherProfile(query);
            else await renderHome();
        }

        // ===== HOME =====
        async function renderHome() {
            const main = document.getElementById('main-content');

            // Check if student has access
            if (isStudent && !hasFullAccess) {
                main.innerHTML = `
                    <div class="card p-8 text-center max-w-2xl mx-auto">
                        <div class="text-5xl mb-4">🔒</div>
                        <h2 class="text-2xl font-bold mb-2">Access Restricted</h2>
                        <p class="text-[var(--text-secondary)] mb-6">Purchase a plan to unlock all content and features.</p>
                        <button onclick="showPurchaseModal()" class="btn-primary">View Plans</button>
                    </div>
                `;
                return;
            }

            // Teacher/Owner dashboard
            if (isTeacher || isOwner || isSuperAdmin) {
                // Analytics cards
                let contentCount = 0,
                    courseCount = 0,
                    groupCount = 0,
                    totalViews = 0;
                try {
                    const cSnap = await Core.getDocs(Core.query(Core.collection(Core.db, 'content'), Core.where('tId', '==', profile.teacherId || '')));
                    contentCount = cSnap.size;
                    cSnap.forEach(d => totalViews += (d.data().views || 0));
                    const coSnap = await Core.getDocs(Core.query(Core.collection(Core.db, 'courses'), Core.where('teacherId', '==', profile.teacherId || '')));
                    courseCount = coSnap.size;
                    const gSnap = await Core.getDocs(Core.query(Core.collection(Core.db, 'groups'), Core.where('teacherId', '==', profile.teacherId || '')));
                    groupCount = gSnap.size;
                } catch (e) {}

                main.innerHTML = `
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h1 class="text-2xl font-bold">Welcome back, ${profile.name}</h1>
                                <p class="text-[var(--text-secondary)] text-sm">${isOwner ? 'Institute Owner' : isTeacher ? 'Teacher' : 'Admin'}</p>
                            </div>
                            <div class="flex gap-2">
                                ${isOwner ? `<button onclick="showPlanManagement()" class="btn-secondary text-sm">Plan Management</button>` : ''}
                                ${isTeacher ? `<button onclick="showScheduleManager()" class="btn-secondary text-sm">Schedule</button>` : ''}
                                <button onclick="showCreateContent()" class="btn-primary text-sm">+ New</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="card hover:border-brandOrange/30">
                                <p class="text-[var(--text-secondary)] text-sm">Content</p>
                                <p class="text-3xl font-bold">${contentCount}</p>
                            </div>
                            <div class="card hover:border-brandOrange/30">
                                <p class="text-[var(--text-secondary)] text-sm">Courses</p>
                                <p class="text-3xl font-bold">${courseCount}</p>
                            </div>
                            <div class="card hover:border-brandOrange/30">
                                <p class="text-[var(--text-secondary)] text-sm">Groups</p>
                                <p class="text-3xl font-bold">${groupCount}</p>
                            </div>
                            <div class="card hover:border-brandOrange/30">
                                <p class="text-[var(--text-secondary)] text-sm">Total Views</p>
                                <p class="text-3xl font-bold">${totalViews}</p>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-lg font-bold mb-4">Recent Content</h3>
                            <div id="recent-content" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                        </div>
                    </div>
                `;

                // Load recent content
                try {
                    const snap = await Core.getDocs(Core.query(Core.collection(Core.db, 'content'), Core.where('tId', '==', profile.teacherId || ''), Core.orderBy('date', 'desc'), Core.limit(6)));
                    const container = document.getElementById('recent-content');
                    if (snap.empty) {
                        container.innerHTML = '<p class="text-[var(--text-secondary)]">No content yet. Start publishing!</p>';
                    } else {
                        container.innerHTML = snap.docs.map(d => {
                            const data = d.data();
                            return `
                                <div class="card cursor-pointer hover:border-brandOrange/30" onclick="openResource('${d.id}','${data.url}','${data.title}')">
                                    <div class="aspect-video rounded-lg overflow-hidden bg-[var(--bg-input)] mb-3">
                                        <img src="${Core.getThumbnail(data.url)}" class="w-full h-full object-cover" loading="lazy">
                                    </div>
                                    <h4 class="font-bold truncate">${data.title}</h4>
                                    <div class="flex items-center gap-2 mt-1">
                                        ${data.type === 'live' ? '<span class="badge-live">Live</span>' : ''}
                                        ${data.isDemo ? '<span class="badge-demo">Demo</span>' : ''}
                                        <span class="text-[var(--text-secondary)] text-xs">${data.views || 0} views</span>
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }
                } catch (e) {}

                // Show ads if owner
                if (isOwner) renderAds();
                return;
            }

            // Student home
            main.innerHTML = `
                <div class="space-y-6">
                    <div>
                        <h1 class="text-2xl font-bold">Welcome, ${profile.name}</h1>
                        <p class="text-[var(--text-secondary)] text-sm">Discover new courses and content</p>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold mb-4">Featured Content</h3>
                        <div id="featured-content" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold mb-4">Your Courses</h3>
                        <div id="student-courses" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            `;

            // Load featured content
            try {
                const snap = await Core.getDocs(Core.query(Core.collection(Core.db, 'content'), Core.limit(6)));
                const container = document.getElementById('featured-content');
                if (snap.empty) {
                    container.innerHTML = '<p class="text-[var(--text-secondary)]">No content available</p>';
                } else {
                    container.innerHTML = snap.docs.map(d => {
                        const data = d.data();
                        const isDemo = data.isDemo || false;
                        const canAccess = hasFullAccess || isDemo;
                        return `

        // ===== Open Resource =====
        window.openResource = async (id, url, title) => {
            if (!id) return;
            try {
                const docRef = Core.doc(Core.db, 'content', id);
                const snap = await Core.getDoc(docRef);
                if (!snap.exists()) return toast('Content not found', 'error');
                const data = snap.data();

                // Check live status
                if (data.type === 'live') {
                    const status = checkLiveStatus(data.liveDate, data.liveStartTime, data.liveEndTime);
                    if (status === 'scheduled') {
                        toast(`Live stream scheduled for ${data.liveDate} at ${data.liveStartTime}`, 'error');
                        return;
                    }
                    if (status === 'recorded') {
                        toast('This live stream has ended', 'error');
                        return;
                    }
                    // Live: open chat
                    document.getElementById('live-classroom-chat-container').classList.add('open');
                    subscribeToLiveChat(id);
                }

                // Increment views
                await Core.updateDoc(docRef, { views: Core.increment(1) });

                // Open vault
                const vault = document.getElementById('media-vault');
                vault.classList.add('open');

                const container = document.getElementById('player-container');
                container.innerHTML = '';

                const vid = Core.extractYTId ? Core.extractYTId(url) : null;

                if (vid) {
                    const div = document.createElement('div');
                    div.id = 'player-instance';
                    div.setAttribute('data-plyr-provider', 'youtube');
                    div.setAttribute('data-plyr-embed-id', vid);
                    container.appendChild(div);
                    videoPlayer = new Plyr('#player-instance', {
                        autoplay: true,
                        ratio: '16:9',
                        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen']
                    });
                } else {
                    const video = document.createElement('video');
                    video.src = url;
                    video.controls = true;
                    video.autoplay = true;
                    video.playsInline = true;
                    container.appendChild(video);
                    videoPlayer = new Plyr(video);
                }

                // Watermark
                const watermark = document.getElementById('secure-watermark');
                watermark.textContent = profile.email || 'OpenClase';
                if (watermarkInterval) clearInterval(watermarkInterval);
                watermarkInterval = setInterval(() => {
                    watermark.style.top = Math.floor(Math.random() * 70) + 15 + '%';
                    watermark.style.left = Math.floor(Math.random() * 65) + 15 + '%';
                }, 3000);

                // Anti-theft
                const blank = document.getElementById('anti-theft-blank');
                document.addEventListener('blur', () => {
                    blank.style.display = 'flex';
                    if (videoPlayer) videoPlayer.pause();
                });
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        blank.style.display = 'flex';
                        if (videoPlayer) videoPlayer.pause();
                    } else {
                        blank.style.display = 'none';
                    }
                });
            } catch (e) {
                toast('Failed to open content', 'error');
            }
        };

        // ===== Live Chat =====
        function subscribeToLiveChat(contentId) {
            if (activeLiveChatListener) activeLiveChatListener();
            const q = Core.query(Core.collection(Core.db, 'liveChats'), Core.where('contentId', '==', contentId), Core.orderBy('createdAt', 'asc'));
            activeLiveChatListener = Core.onSnapshot(q, (snap) => {
                const container = document.getElementById('live-chat-messages-target');
                container.innerHTML = '';
                if (snap.empty) {
                    container.innerHTML = '<p class="text-[var(--text-secondary)] text-sm text-center py-4">No messages yet</p>';
                    return;
                }
                snap.forEach(d => {
                    const msg = d.data();
                    const div = document.createElement('div');
                    div.className = 'flex items-start gap-2';
                    div.innerHTML = `
                        <div class="w-7 h-7 rounded-full bg-[var(--bg-input)] shrink-0 overflow-hidden">
                            <img src="${msg.senderPhoto || 'https://ui-avatars.com/api/?name=' + msg.senderName}" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <p class="text-xs font-bold">${msg.senderName}</p>
                            <p class="text-sm">${msg.text}</p>
                        </div>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }
