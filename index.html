<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link id="app-manifest" rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="theme-color" content="#050505">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('PWA Registered'))
                    .catch(err => console.error('SW Registration Failed:', err));
            });
        }
    </script>

    <title>OpenClase | Premium SaaS LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brandBlue: '#004a80', brandOrange: '#f7941d' } } } }
    </script>
    <style>
        /* ─── BASE ─── */
        :root {
            --text-main: #fdfbf7;
            --bg-main: #050505;
            --glass-bg: rgba(20, 20, 20, 0.85);
            --input-bg: #111;
            --border-color: rgba(255, 255, 255, 0.1);
            --brandBlue: #004a80;
            --brandOrange: #f7941d;
            --radius-card: 24px;
            --radius-xl: 32px;
        }

        .light {
            --text-main: #1a1a1a;
            --bg-main: #fbf9f1;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --input-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * {
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        html,
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.25);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--brandOrange);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
        }

        .btn-brand {
            background: linear-gradient(135deg, #004a80 0%, #f7941d 100%);
            background-size: 200% auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-position 0.5s;
            color: #fff !important;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-brand:hover {
            background-position: right center;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 74, 128, 0.3);
        }

        .input-field {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            outline: none;
            padding: 1rem;
            border-radius: 14px;
            width: 100%;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-field:focus {
            border-color: var(--brandOrange);
            box-shadow: 0 0 12px rgba(247, 148, 29, 0.08);
        }
        .input-field::placeholder {
            color: rgba(128, 128, 128, 0.5);
        }

        /* ─── TOAST ─── */
        #toast-box {
            position: fixed;
            bottom: 8rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }
        .toast-pill {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 0.7rem 1.8rem;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        @keyframes popUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ─── TOP NAVBAR (original) ─── */
        .top-navbar {
            padding: 0.75rem 1.25rem;
            background: var(--glass-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding-top: max(1rem, env(safe-area-inset-top));
        }
        .top-navbar .brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            flex-shrink: 0;
        }
        .top-navbar .brand img {
            height: 2rem;
            width: 2rem;
            border-radius: 0.75rem;
            object-fit: cover;
        }
        .top-navbar .brand h2 {
            font-size: 1.25rem;
            font-weight: 800;
            font-style: italic;
            letter-spacing: -0.02em;
            white-space: nowrap;
        }
        .top-navbar .brand h2 span {
            color: var(--brandOrange);
        }
        .top-navbar .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 99px;
            padding: 0 0.75rem;
            flex: 1 1 180px;
            max-width: 300px;
            transition: all 0.3s;
        }
        .top-navbar .search-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 0.5rem 0.4rem;
            font-size: 0.85rem;
            width: 100%;
        }
        .top-navbar .search-wrapper input::placeholder {
            color: rgba(128, 128, 128, 0.5);
        }
        .top-navbar .search-wrapper button {
            background: transparent;
            border: none;
            color: var(--text-main);
            opacity: 0.5;
            cursor: pointer;
            padding: 0.25rem;
        }
        .top-navbar .actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }
        .top-navbar .actions .icon-btn {
            width: 2.25rem;
            height: 2.25rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
        }
        .top-navbar .actions .icon-btn:hover {
            transform: scale(1.08);
            border-color: var(--brandOrange);
        }
        .top-navbar .actions .icon-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: #fff;
            font-size: 0.55rem;
            font-weight: 800;
            min-width: 1rem;
            height: 1rem;
            border-radius: 99px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 0.25rem;
            border: 1px solid var(--bg-main);
        }
        .top-navbar .actions .profile-pic {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid var(--brandOrange);
            flex-shrink: 0;
        }
        .top-navbar .actions .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width: 640px) {
            .top-navbar .brand h2 {
                font-size: 1rem;
            }
            .top-navbar .search-wrapper {
                max-width: 120px;
            }
            .top-navbar .actions .icon-btn {
                width: 2rem;
                height: 2rem;
                font-size: 0.9rem;
            }
            .top-navbar .actions .profile-pic {
                width: 2rem;
                height: 2rem;
            }
        }

        /* ─── PROFILE HEADER (compact) ─── */
        .profile-header-compact {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            border-radius: var(--radius-xl);
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .profile-header-compact .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--brandOrange);
            flex-shrink: 0;
            background: #111;
        }
        .profile-header-compact .name-id {
            flex: 1;
            min-width: 120px;
        }
        .profile-header-compact .name-id h2 {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.2;
        }
        .profile-header-compact .name-id p {
            font-size: 10px;
            opacity: 0.5;
            font-weight: 700;
            letter-spacing: 0.05em;
            font-family: monospace;
            margin-top: 1px;
        }
        .profile-header-compact .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .profile-header-compact .quick-actions .qa-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 8px 14px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .profile-header-compact .quick-actions .qa-btn:hover {
            border-color: var(--brandOrange);
            background: rgba(247, 148, 29, 0.08);
            transform: scale(1.03);
        }
        .profile-header-compact .quick-actions .qa-btn i {
            font-size: 12px;
            opacity: 0.7;
        }
        @media (max-width: 640px) {
            .profile-header-compact {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .profile-header-compact .name-id {
                text-align: center;
            }
            .profile-header-compact .quick-actions {
                justify-content: center;
            }
            .profile-header-compact .quick-actions .qa-btn {
                font-size: 8px;
                padding: 6px 10px;
            }
        }

        /* ─── DASHBOARD GRID 3×2 ─── */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-top: 18px;
        }
        .dash-grid .dash-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 20px 16px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.3s;
            cursor: default;
            min-height: 120px;
            position: relative;
        }
        .dash-grid .dash-card:hover {
            transform: translateY(-4px);
            border-color: rgba(247, 148, 29, 0.3);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }
        .dash-grid .dash-card .card-icon {
            font-size: 32px;
            margin-bottom: 8px;
            opacity: 0.8;
        }
        .dash-grid .dash-card .card-label {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .dash-grid .dash-card .card-action {
            margin-top: 10px;
            background: var(--brandOrange);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 99px;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.06em;
        }
        .dash-grid .dash-card .card-action:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(247, 148, 29, 0.3);
        }
        .dash-grid .dash-card .card-badge {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 7px;
            font-weight: 800;
            text-transform: uppercase;
            background: rgba(247, 148, 29, 0.15);
            color: var(--brandOrange);
            padding: 2px 10px;
            border-radius: 99px;
            border: 1px solid rgba(247, 148, 29, 0.15);
        }
        @media (max-width: 480px) {
            .dash-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .dash-grid .dash-card {
                min-height: 100px;
                padding: 14px 10px;
            }
            .dash-grid .dash-card .card-icon {
                font-size: 24px;
            }
            .dash-grid .dash-card .card-label {
                font-size: 10px;
            }
        }

        /* ─── FLOATING NAV ISLAND ─── */
        #floating-nav-island {
            position: fixed;
            bottom: max(1.5rem, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 4500;
            width: calc(100% - 2.4rem);
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: 99px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }
        #floating-nav-island.nav-hidden {
            transform: translate(-50%, 120px);
            opacity: 0;
            pointer-events: none;
        }
        #floating-nav-island .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-main);
            opacity: 0.4;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid transparent;
            background: transparent;
            line-height: 1;
        }
        #floating-nav-island .nav-item i {
            font-size: 18px;
            margin-bottom: 1px;
        }
        #floating-nav-island .nav-item.active {
            opacity: 1;
            background: rgba(247, 148, 29, 0.12);
            border-color: rgba(247, 148, 29, 0.2);
            color: var(--brandOrange);
        }
        #floating-nav-island .nav-item:hover {
            opacity: 0.8;
            transform: scale(1.04);
        }
        @media (max-width: 480px) {
            #floating-nav-island {
                padding: 6px 8px;
                width: calc(100% - 1.6rem);
            }
            #floating-nav-island .nav-item {
                font-size: 7px;
                padding: 4px 8px;
            }
            #floating-nav-island .nav-item i {
                font-size: 15px;
            }
        }

        /* ─── SKELETON ─── */
        .skeleton {
            background: var(--input-bg);
            border-radius: 14px;
            animation: shimmer 1.6s ease-in-out infinite;
            min-height: 80px;
            border: 1px solid var(--border-color);
        }
        @keyframes shimmer {
            0% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.9;
            }
            100% {
                opacity: 0.4;
            }
        }
        .skeleton-text {
            height: 16px;
            border-radius: 8px;
            background: var(--input-bg);
            margin: 6px 0;
            animation: shimmer 1.6s ease-in-out infinite;
        }
        .skeleton-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--input-bg);
            animation: shimmer 1.6s ease-in-out infinite;
        }

        /* ─── MODAL OVERLAY ─── */
        #custom-modal {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(16px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #custom-modal.show {
            display: flex;
        }
        #custom-modal .modal-content {
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 24px 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }
        #custom-modal .modal-content .modal-close {
            float: right;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s;
            color: var(--text-main);
        }
        #custom-modal .modal-content .modal-close:hover {
            background: #dc2626;
            color: #fff;
            transform: scale(1.08);
        }

        /* ─── MEDIA VAULT ─── */
        #media-vault {
            position: fixed;
            inset: 0;
            z-index: 20000;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        #media-vault.show {
            display: flex;
        }
        #media-vault .vault-close {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2147483647;
            transition: all 0.3s;
            touch-action: none;
        }
        #media-vault .vault-close:hover {
            background: #dc2626;
            transform: scale(1.06);
        }
        #vault-wrapper {
            width: 100%;
            max-width: 900px;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #vault-wrapper .plyr {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
        }
        #vault-wrapper .plyr video {
            max-height: 80vh;
            object-fit: contain;
        }
        #live-chat-side {
            display: none;
            width: 100%;
            max-width: 360px;
            height: 70vh;
            max-height: 500px;
            background: rgba(10, 10, 10, 0.95);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            flex-direction: column;
            margin-left: 14px;
        }
        #live-chat-side.show {
            display: flex;
        }
        #live-chat-side .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #ef4444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #live-chat-side .chat-header .pulse-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.8);
            }
        }
        #live-chat-side .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #live-chat-side .chat-messages .msg {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        #live-chat-side .chat-messages .msg .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #222;
            flex-shrink: 0;
            object-fit: cover;
        }
        #live-chat-side .chat-messages .msg .bubble {
            background: rgba(255, 255, 255, 0.06);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            max-width: 85%;
            word-break: break-word;
        }
        #live-chat-side .chat-input-row {
            padding: 10px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
        }
        #live-chat-side .chat-input-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 99px;
            padding: 8px 16px;
            font-size: 12px;
            color: #fff;
            outline: none;
        }
        #live-chat-side .chat-input-row input:focus {
            border-color: var(--brandOrange);
        }
        #live-chat-side .chat-input-row button {
            background: var(--brandOrange);
            border: none;
            border-radius: 99px;
            padding: 8px 18px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;

        const adPopupImg = $('ad-popup-img');

        // ─── TOAST ───
        function toast(msg, type = 'info') {
            const el = document.createElement('div');
            el.className = 'toast-pill';
            if (type === 'error') el.style.borderColor = '#ef4444';
            if (type === 'success') el.style.borderColor = '#22c55e';
            el.textContent = msg;
            toastBox.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // ─── MODAL ───
        function openModal(html) {
            modal.classList.add('show');
            modalBody.innerHTML = html;
        }

        function closeModal() {
            modal.classList.remove('show');
            modalBody.innerHTML = '';
            toggleNav(true);
        }

        // ─── NAV ───
        function toggleNav(show) {
            const nav = $('floating-nav-island');
            if (show) nav.classList.remove('nav-hidden');
            else nav.classList.add('nav-hidden');
        }

        // ─── SET TAB ───
        function setTab(tab) {
            currentTab = tab;
            // Update nav items
            document.querySelectorAll('#floating-nav-island .nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            toggleNav(true);
            window.scrollTo({ top: 0, behavior: 'instant' });
            renderDashboard();
        }

        // ─── RENDER DASHBOARD ───
        async function renderDashboard() {
            if (!profile) return;
            const isTeacher = profile.role === 'teacher' || profile.role === 'super_admin';
            const isStudent = profile.role === 'student';

            // ── Update top navbar profile pic ──
            const pic = $('nav-profile-pic').querySelector('img');
            if (pic) pic.src = profile.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=004a80&color=fff&size=128`;

            // ── Update floating nav items ──
            const nav = $('floating-nav-island');
            let tabs = [];
            if (isTeacher) {
                tabs = [
                    { tab: 'dashboard', icon: 'fa-th-large', label: 'Dashboard' },
                    { tab: 'groups', icon: 'fa-users', label: 'Groups' },
                    { tab: 'analytics', icon: 'fa-chart-line', label: 'Analytics' }
                ];
            } else {
                tabs = [
                    { tab: 'home', icon: 'fa-home', label: 'Home' },
                    { tab: 'courses', icon: 'fa-book', label: 'Courses' },
                    { tab: 'groups', icon: 'fa-users', label: 'Groups' },
                    { tab: 'content', icon: 'fa-file-alt', label: 'Content' }
                ];
            }
            nav.innerHTML = tabs.map(t => `
                <div class="nav-item ${currentTab === t.tab ? 'active' : ''}" data-tab="${t.tab}" onclick="setTab('${t.tab}')">
                    <i class="fas ${t.icon}"></i>
                    <span>${t.label}</span>
                </div>
            `).join('');

            // ── Render main content based on tab ──
            if (isTeacher) {
                if (currentTab === 'dashboard') await renderTeacherDashboard();
                else if (currentTab === 'groups') await renderGroupsTab();
                else if (currentTab === 'analytics') await renderAnalyticsTab();
            } else {
                if (currentTab === 'home') await renderStudentHome();
                else if (currentTab === 'courses') await renderStudentCourses();
                else if (currentTab === 'groups') await renderGroupsTab();
                else if (currentTab === 'content') await renderStudentContent();
            }
        }

        // ─── TEACHER DASHBOARD ───

            // Build profile header with quick actions
            const profileHeader = `
                <div class="profile-header-compact fade-in">

            // 3x2 grid
            const gridHTML = `

                                    <div class="ad-item">
                                        <img src="${a.image}" alt="ad">
                                        <button class="ad-close" onclick="this.parentElement.remove()">✕</button>
                                    </div>
                                `).join('')}
                            </div>

            mainContent.innerHTML = `
                <div class="fade-in space-y-4">
                    ${profileHeader}

        // ─── ANALYTICS TAB ───
        async function renderAnalyticsTab() {
            const isTeacher = profile.role === 'teacher' || profile.role === 'super_admin';
            if (!isTeacher) {
                mainContent.innerHTML = `<div class="glass p-10 text-center rounded-2xl"><p class="opacity-50">Analytics available for instructors only.</p></div>`;
                return;
            }

            const [contentSnap, followersSnap, courseSnap, groupSnap] = await Promise.all([
                Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "==", profile.teacherId || ""))),
                Core.getDocs(Core.query(Core.collection(Core.db, "users"), Core.where("subs", "array-contains", profile.teacherId || ""))),
                Core.getDocs(Core.query(Core.collection(Core.db, "courses"), Core.where("teacherId", "==", profile.teacherId || ""))),
                Core.getDocs(Core.query(Core.collection(Core.db, "groups"), Core.where("teacherId", "==", profile.teacherId || "")))
            ]);

            let totalViews = 0;
            contentSnap.forEach(d => totalViews += (d.data().views || 0));

            mainContent.innerHTML = `
                <div class="fade-in space-y-6">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="glass p-5 rounded-2xl text-center"><p class="text-[9px] uppercase opacity-40 font-black">Followers</p><h2 class="text-3xl font-black">${followersSnap.size}</h2></div>
                        <div class="glass p-5 rounded-2xl text-center"><p class="text-[9px] uppercase opacity-40 font-black">Total Views</p><h2 class="text-3xl font-black">${totalViews}</h2></div>
                        <div class="glass p-5 rounded-2xl text-center"><p class="text-[9px] uppercase opacity-40 font-black">Uploads</p><h2 class="text-3xl font-black">${contentSnap.size}</h2></div>
                        <div class="glass p-5 rounded-2xl text-center"><p class="text-[9px] uppercase opacity-40 font-black">Courses</p><h2 class="text-3xl font-black">${courseSnap.size}</h2></div>
                    </div>
                    <div class="glass p-5 rounded-2xl">
                        <p class="text-[10px] font-black uppercase opacity-40 mb-3">Top Performing Content</p>
                        <div id="top-content-list" class="space-y-2"></div>
                    </div>
                </div>
            `;

            const sorted = contentSnap.docs.sort((a, b) => (b.data().views || 0) - (a.data().views || 0));
            const top = sorted.slice(0, 5);
            const list = $('top-content-list');
            if (top.length === 0) {
                list.innerHTML = '<p class="text-xs opacity-40">No content published yet.</p>';
            } else {
                list.innerHTML = top.map(d => `
                    <div class="flex justify-between items-center border-b border-[var(--border-color)] pb-2">
                        <span class="text-sm font-bold truncate">${d.data().title}</span>
                        <span class="text-brandOrange font-black">${d.data().views || 0} views</span>
                    </div>

        function getSmartPreview(url) {
            if (!url) return 'https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg';
            const clean = url.toLowerCase().trim();
            if (clean.match(/\.(jpeg|jpg|gif|png|webp|svg)/)) return url;
            const ytId = extractYTId(url);
            if (ytId) return `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`;
            return 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop';
        }

        function extractYTId(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/|live\/)([^#&?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

                const end = parseInt(s.endTime.split(':')[0]) * 60 + parseInt(s.endTime.split(':')[1]);
                if (now >= start && now <= end) live = { id: d.id, ...s };

            // Find content for this live session (if any)
            const contentSnap = await Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("liveSessionId", "==", live.id)));

                toast("No stream link available for this live session.", "error");

                div.id = 'player-instance';
                div.setAttribute('data-plyr-provider', 'youtube');

                    videoPlayer = new Plyr(video, { autoplay: true });

            if (!email || !pass) return toast("Email and password required", "error");
            if (isSignup) {
                const name = $('reg-name').value.trim();
                const role = $('reg-role').value;

                const instId = $('reg-institute-id').value.trim() || null;

        // ─── VAULT CLOSE DRAG ───
        (function initVaultDrag() {
            const btn = $('vault-close-btn');
            if (!btn) return;
            let isDragging = false,
                startX, startY, origX, origY;
            btn.addEventListener('mousedown', (e) => {
                isDragging = true;
                const rect = btn.getBoundingClientRect();
                startX = e.clientX;
                startY = e.clientY;
                origX = rect.left;
                origY = rect.top;
                btn.style.position = 'fixed';
                btn.style.left = origX + 'px';
                btn.style.top = origY + 'px';
                btn.style.bottom = 'auto';
                btn.style.right = 'auto';
                document.addEventListener('mousemove', onDragMove);
                document.addEventListener('mouseup', onDragEnd);
            });
            btn.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                isDragging = true;
                const rect = btn.getBoundingClientRect();
                startX = touch.clientX;
                startY = touch.clientY;
                origX = rect.left;
                origY = rect.top;
                btn.style.position = 'fixed';
                btn.style.left = origX + 'px';
                btn.style.top = origY + 'px';
                btn.style.bottom = 'auto';
                btn.style.right = 'auto';
                document.addEventListener('touchmove', onTouchMove, { passive: false });
                document.addEventListener('touchend', onTouchEnd);
            }, { passive: false });

            function onDragMove(e) {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                btn.style.left = Math.max(0, Math.min(origX + dx, window.innerWidth - 60)) + 'px';
                btn.style.top = Math.max(0, Math.min(origY + dy, window.innerHeight - 60)) + 'px';
                e.preventDefault();
            }

            function onTouchMove(e) {
                if (!isDragging) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;
                btn.style.left = Math.max(0, Math.min(origX + dx, window.innerWidth - 60)) + 'px';
                btn.style.top = Math.max(0, Math.min(origY + dy, window.innerHeight - 60)) + 'px';
                e.preventDefault();
            }

            function onDragEnd() {
                isDragging = false;
                document.removeEventListener('mousemove', onDragMove);
                document.removeEventListener('mouseup', onDragEnd);
            }

            function onTouchEnd() {
                isDragging = false;
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            }

            btn.addEventListener('click', (e) => {
                if (isDragging) { e.preventDefault();
                    isDragging = false; return; }
                window.closeVault();
            });
        })();

                    <p><strong>Name:</strong> ${profile.name}</p>
                    <p><strong>Email:</strong> ${profile.email}</p>
                    <p><strong>Role:</strong> ${profile.role}</p>
                    <p><strong>ID:</strong> ${profile.teacherId || 'N/A'}</p>
                    <button onclick="logout()" class="w-full py-3 bg-red-500/20 text-red-500 rounded-xl text-xs font-black"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                </div>
            `);
        };

        // ─── INIT ───
        console.log('🚀 OpenClase LMS loaded with all features.');
        // Load admin sections if needed
        setTimeout(() => {
            if ($('plans-list')) loadPlansList();
            if ($('payments-list')) loadPayments();
        }, 500);
    </script>
</body>
</html>
