<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClass | Premium SaaS LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brandBlue: '#004a80', brandOrange: '#f7941d' } } } }
    </script>
    <style>
        :root { --text-main: #fdfbf7; --bg-main: #050505; --glass-bg: rgba(15, 15, 15, 0.9); --input-bg: #111; }
        .light { --text-main: #002e50; --bg-main: #fdfbf7; --glass-bg: rgba(255, 255, 255, 0.85); --input-bg: #fff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: 0.4s; overflow-x: hidden; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid rgba(128, 128, 128, 0.1); }
        .btn-brand { background: linear-gradient(135deg, #004a80 0%, #f7941d 100%); background-size: 200% auto; transition: 0.5s; color: white !important; font-weight: 800; text-transform: uppercase; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-brand:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 74, 128, 0.2); }
        .tab-btn { padding: 12px 20px; font-weight: 800; text-transform: uppercase; font-size: 10px; border-radius: 12px; transition: 0.3s; opacity: 0.4; color: var(--text-main); }
        .tab-btn.active { background: rgba(247, 148, 29, 0.1); color: #f7941d; opacity: 1; border: 1px solid rgba(247, 148, 29, 0.2); }
        .input-field { background: var(--input-bg); border: 1px solid rgba(128, 128, 128, 0.2); color: var(--text-main); outline: none; padding: 1rem; border-radius: 14px; width: 100%; }
        #toast-box { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast-pill { background: #111; color: #fff; padding: 0.6rem 1.5rem; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: 800; text-transform: uppercase; animation: popUp 0.3s forwards; }
        
        #media-vault .plyr__video-embed iframe { transform: scale(1.4); pointer-events: none; }
        .plyr--full-ui.plyr--video .plyr__control--overlaid { background: #f7941d; }
        .plyr--video .plyr__controls { background: linear-gradient(transparent, rgba(0,0,0,0.8)); border-radius: 0 0 14px 14px; }
        .grid-btn-active { background: rgba(247, 148, 29, 0.2) !important; border: 1px solid rgba(247, 148, 29, 0.3) !important; color: #f7941d !important; }

        #anti-theft-blank { display: none; position: absolute; inset: 0; background: #000; z-index: 2900; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-weight: 800; text-transform: uppercase; font-size: 14px; letter-spacing: 0.1em; }
        #secure-watermark { position: absolute; z-index: 2800; pointer-events: none; font-weight: 800; font-size: 18px; color: rgba(255, 255, 255, 0.15); mix-blend-mode: difference; white-space: nowrap; user-select: none; transition: all 1s ease-in-out; }
        @keyframes popUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-brandOrange/30">
    <div id="toast-box"></div>

    <div id="custom-modal" class="hidden fixed inset-0 z-[2500] bg-black/95 backdrop-blur-md flex items-center justify-center p-6">
        <div id="modal-content" class="w-full max-w-md glass p-10 rounded-[3rem] border border-brandOrange/20 shadow-2xl overflow-y-auto max-h-[90vh]"></div>
    </div>

    <div id="media-vault" class="hidden fixed inset-0 z-[2000] bg-black flex items-center justify-center">
        <button onclick="closeVault()" class="absolute top-6 right-6 bg-white/10 hover:bg-red-500 text-white w-12 h-12 rounded-full flex items-center justify-center font-black z-[3100]">✕</button>
        <div class="w-full max-w-5xl overflow-hidden rounded-2xl shadow-2xl relative bg-zinc-900 flex items-center justify-center min-h-[50vh]">
             <div id="anti-theft-blank">⚠️ Secure Environment Active | Capture Prevented</div>
             <div id="secure-watermark"></div>
             <div id="player-container" class="w-full h-full aspect-video">
                 <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
             </div>
             <div id="file-preview-frame" class="hidden w-full h-[80vh] p-4 overflow-auto flex items-center justify-center bg-zinc-950"></div>
        </div>
    </div>

    <div id="group-chat-window" class="hidden fixed inset-0 bg-black/95 z-[6000] flex flex-col">
        <div class="p-5 glass flex justify-between items-center border-b border-white/5">
            <h2 id="group-chat-title" class="text-2xl font-black italic">Group</h2>
            <button onclick="closeGroupChat()" class="text-2xl">✕</button>
        </div>
        <div id="group-chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div class="p-4 flex gap-4 glass border-t border-white/5">
            <input id="group-message-input" class="input-field flex-1" placeholder="Message...">
            <button onclick="sendGroupMessage()" class="btn-brand px-8">Send</button>
        </div>
    </div>

    <div id="app">
        <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] text-center shadow-2xl">
                <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-20 mx-auto mb-6 rounded-2xl">
                <h1 class="text-4xl font-black mb-8 italic">Open<span class="text-brandOrange">Class</span></h1>
                <div id="signup-fields" class="hidden space-y-4 mb-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="input-field">
                    <select id="reg-role" class="input-field">
                        <option value="student">Student Account</option>
                        <option value="teacher">Teacher Account</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email" class="input-field">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-field">
                    <button onclick="handleAuth()" id="primary-auth-btn" class="w-full py-4 btn-brand">Sign In</button>
                    <button onclick="handleGoogle()" class="w-full py-4 glass dark:text-white text-[#002e50] rounded-2xl font-bold uppercase text-[10px] flex items-center justify-center gap-4 border border-zinc-500/20">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> 
                        Continue with Google
                    </button>
                    <button onclick="toggleAuth()" id="toggle-auth-btn" class="w-full text-[10px] text-zinc-500 font-bold uppercase mt-6 hover:text-brandOrange">Create Profile</button>
                </div>
            </div>
        </div>

        <div id="verify-screen" class="hidden min-h-screen flex items-center justify-center p-6 relative">
            <button onclick="showScreen('auth-screen')" class="absolute top-10 right-10 text-2xl font-black text-white/30 hover:text-white">✕</button>
            <div class="w-full max-w-md glass p-10 rounded-[3.5rem] text-center border-brandOrange/20 shadow-2xl">
                <h2 class="text-3xl font-black mb-4 italic">Verify Code</h2>
                <p id="verify-note" class="text-zinc-500 text-[10px] mb-8 uppercase font-bold"></p>
                <input type="number" id="otp-input" placeholder="000000" class="input-field text-center text-5xl font-black mb-6">
                <button onclick="checkOTP()" class="w-full py-5 btn-brand shadow-xl">Verify</button>
            </div>
        </div>

        <div id="dashboard" class="hidden min-h-screen flex flex-col">
            <nav class="p-5 glass border-b border-white/5 sticky top-0 z-[1000] flex flex-col md:flex-row gap-6 justify-between px-10 items-center">
                <div class="flex items-center gap-4 cursor-pointer" onclick="navigate('home')">
                    <img src="https://res.cloudinary.com/dowhvdkjh/image/upload/v1777895769/IMG-20260504-WA0002_fucbjd.jpg" class="h-10 rounded-xl">
                    <h2 class="text-2xl font-black italic tracking-tighter">Open<span class="text-brandOrange">Class</span></h2>
                </div>
                
                <div class="flex gap-1 glass p-1 rounded-2xl">
                    <button id="tab-home" onclick="setTab('home')" class="tab-btn active">Home</button>
                    <button id="tab-groups" onclick="setTab('groups')" class="tab-btn">Groups</button>
                    <button id="tab-courses" onclick="setTab('courses')" class="tab-btn">Courses</button>
                    <button id="tab-content" onclick="setTab('content')" class="tab-btn">Content</button>
                </div>

                <div class="flex items-center gap-6 w-full md:w-auto relative">
                    <button id="cart-nav-trigger" onclick="openCartWorkspaceView()" class="hidden text-xs py-2 px-4 rounded-xl bg-brandOrange/10 border border-brandOrange/20 font-black uppercase text-brandOrange tracking-wider">🛒 Inventory (<span id="cart-items-count">0</span>)</button>
                    <div class="relative w-full md:w-96 group">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="8" cy="8" r="6" /><path d="M13 13l4 4" /></svg></div>
                        <input type="text" id="g-search" oninput="reactiveSearch(this.value)" placeholder="Search campus..." class="input-field rounded-2xl pl-12 pr-6 py-2.5 text-sm w-full">
                    </div>
                    <button onclick="toggleMode()" class="p-2 glass rounded-xl">🌓</button>
                    <div id="nav-profile-pic" class="w-10 h-10 rounded-full border-2 overflow-hidden hidden md:block"></div>
                    <button onclick="logout()" class="text-[10px] font-black text-red-500 uppercase px-4 py-2 border border-red-500/20 rounded-xl">Logout</button>
                </div>
            </nav>
            <main id="main-content" class="p-10 max-w-7xl mx-auto w-full flex-grow"></main>
        </div>
    </div>

    <div id="onboarding-screen" class="hidden min-h-screen flex items-center justify-center p-6 relative">
        <button onclick="logout()" class="absolute top-10 right-10 text-2xl font-black text-white/30 hover:text-white">✕</button>
        <div class="w-full max-w-md glass p-10 rounded-[3.5rem] border-brandOrange/20 shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-6 italic">Finalize Profile</h2>
            <div class="space-y-4">
                <input type="text" id="ob-name" placeholder="Full Name" class="input-field">
                <select id="ob-role" class="input-field">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
                <input type="password" id="ob-pass" placeholder="Secure Password" class="input-field">
                <button onclick="finalizeProfile()" class="w-full py-5 btn-brand">Activate</button>
            </div>
        </div>
    </div>

    <div onclick="toggleAIChat()" class="fixed bottom-6 right-6 z-[5000] w-16 h-16 rounded-full btn-brand flex items-center justify-center text-3xl cursor-pointer shadow-2xl">🤖</div>
    <div id="ai-chat-window" class="hidden fixed bottom-24 right-6 w-[380px] h-[600px] glass rounded-[2rem] z-[5000] overflow-hidden flex flex-col border border-brandOrange/20">
        <div class="p-5 border-b border-white/10 flex justify-between items-center"><h2 class="font-black text-lg italic text-brandOrange">OpenClass AI</h2><button onclick="toggleAIChat()">✕</button></div>
        <div id="ai-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-4 border-t border-white/10 flex gap-3"><input id="ai-input" type="text" placeholder="Ask AI..." class="input-field flex-1"><button onclick="sendAIMessage()" class="btn-brand px-5 rounded-xl">Send</button></div>
    </div>

    <script type="module">
        import * as Core from "./app.js";
        import { aiConfig } from "./config.js";

        let profile = null, isSignup = false, otpCode = null, tempUser = null, activeGroupId = null, currentTab = 'home', videoPlayer = null;
        let currentVideoContext = null, watermarkInterval = null, checkoutBasket = [];

        window.addEventListener('keydown', (e) => {
            if (!videoPlayer || ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
            if (e.code === 'Space') { e.preventDefault(); videoPlayer.togglePlay(); }
            else if (e.code === 'ArrowRight') videoPlayer.forward(10);
            else if (e.code === 'ArrowLeft') videoPlayer.rewind(10);
        });

        function activateAntiTheftShields() {
            const blankOverlay = document.getElementById('anti-theft-blank');
            const watermarkEl = document.getElementById('secure-watermark');

            if (profile && profile.email) {
                watermarkEl.innerText = profile.email;
                moveWatermark();
                clearInterval(watermarkInterval);
                watermarkInterval = setInterval(moveWatermark, 4000);
            }

            navigator.clipboard?.writeText?.("Protected Video Space.");

            window.addEventListener('blur', engageShield);
            document.addEventListener('visibilitychange', handleVisibility);
            
            function engageShield() {
                if (videoPlayer && videoPlayer.playing) videoPlayer.pause();
                if (blankOverlay) blankOverlay.style.display = 'flex';
            }
            function handleVisibility() {
                if (document.visibilityState === 'hidden') engageShield();
                else if (blankOverlay) blankOverlay.style.display = 'none';
            }

            window._disengageShields = () => {
                window.removeEventListener('blur', engageShield);
                document.removeEventListener('visibilitychange', handleVisibility);
                clearInterval(watermarkInterval);
                if (blankOverlay) blankOverlay.style.display = 'none';
                if (watermarkEl) watermarkEl.innerText = "";
            };
        }

        function moveWatermark() {
            const watermarkEl = document.getElementById('secure-watermark');
            if (!watermarkEl || watermarkEl.innerText === "") return;
            watermarkEl.style.top = `${Math.floor(Math.random() * 75) + 5}%`;
            watermarkEl.style.left = `${Math.floor(Math.random() * 70) + 5}%`;
        }

        window.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen') {
                navigator.clipboard?.writeText?.("Capture blocked.");
                toast("Screenshots Blocked", "error");
            }
        });

        function setupPlayer(videoId, metadata) {
            currentVideoContext = metadata;
            const container = document.getElementById('player-container');
            const fileFrame = document.getElementById('file-preview-frame');
            
            container.classList.remove('hidden');
            fileFrame.classList.add('hidden');
            container.innerHTML = '<div id="player-instance"></div>';
            
            if (videoPlayer) videoPlayer.destroy();
            
            videoPlayer = new Plyr('#player-instance', {
                autoplay: true,
                youtube: { noCookie: true, rel: 0, showinfo: 0, iv_load_policy: 3, modestbranding: 1, controls: 0, disablekb: 1 }
            });
            videoPlayer.source = { type: 'video', sources: [{ src: videoId, provider: 'youtube' }] };
            activateAntiTheftShields();
        }

        function setupFilePreview(url) {
            const container = document.getElementById('player-container');
            const fileFrame = document.getElementById('file-preview-frame');
            container.classList.add('hidden');
            fileFrame.classList.remove('hidden');
            
            const cleanUrl = url.split('?')[0].toLowerCase();
            if (cleanUrl.match(/\.(jpeg|jpg|gif|png|webp|svg)$/) || url.includes('image/upload') || url.includes('img')) {
                fileFrame.innerHTML = `<img src="${url}" class="max-w-full max-h-[75vh] rounded-xl object-contain shadow-2xl border border-white/5">`;
            } else if (cleanUrl.endsWith('.pdf')) {
                fileFrame.innerHTML = `<iframe src="${url}" class="w-full h-[75vh] rounded-xl border-none bg-white"></iframe>`;
            } else {
                fileFrame.innerHTML = `<div class="text-center p-12 glass rounded-3xl max-w-md"><p class="mb-6 font-black text-sm uppercase tracking-wide">External Resource Link</p><a href="${url}" target="_blank" class="btn-brand py-3 px-8 text-xs inline-flex">Launch Document URL</a></div>`;
            }
            activateAntiTheftShields();
        }

        window.setTab = (t) => {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const element = document.getElementById(`tab-${t}`);
            if(element) element.classList.add('active');
            loadHome();
        };

        window.reactiveSearch = (val) => { if (val.length < 2) return; navigate('search', val); };
        window.onpopstate = (e) => { if (profile) renderContent(e.state?.p || 'home', e.state?.q || ''); };
        window.navigate = (p, q = '') => { history.pushState({ p, q }, '', `#${p}`); renderContent(p, q); };

        async function renderContent(p, q) {
            if (p === 'home') loadHome();
            else if (p === 'search') loadSearch(q);
            else if (p === 'profile') viewTeacher(q);
        }

        window.loadHome = async () => {
            const main = document.getElementById('main-content');
            if (!profile) return;
            
            if (profile.role === 'teacher') {
                document.getElementById('cart-nav-trigger').classList.add('hidden');
                const [contentSnap, followersSnap, courseSnap, groupSnap] = await Promise.all([
                    Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "==", profile.teacherId))),
                    Core.getDocs(Core.query(Core.collection(Core.db, "users"), Core.where("subs", "array-contains", profile.teacherId))),
                    Core.getDocs(Core.query(Core.collection(Core.db, "courses"), Core.where("teacherId", "==", profile.teacherId))),
                    Core.getDocs(Core.query(Core.collection(Core.db, "groups"), Core.where("teacherId", "==", profile.teacherId)))
                ]);
                let totalViews = 0; contentSnap.forEach(d => totalViews += (d.data().views || 0));
                
                // Sorting newest updates at top mapping logic
                const structuredContent = contentSnap.docs.sort((a,b) => (b.data().date?.toMillis() || 0) - (a.data().date?.toMillis() || 0));

                main.innerHTML = `
                <div class="grid lg:grid-cols-4 gap-10">
                    <div class="space-y-6 lg:sticky lg:top-32 h-fit">
                        <div class="glass p-8 rounded-[3rem] border border-brandBlue/30 text-center shadow-xl">
                            <img src="${profile.photo || 'https://ui-avatars.com/api/?name='+profile.name}" class="w-24 h-24 mx-auto mb-4 rounded-full border-4 border-brandBlue p-1 object-cover">
                            <h3 class="text-xl font-black italic">${profile.name}</h3>
                            <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-6">${profile.teacherId}</p>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-white/5 p-4 rounded-3xl text-center"><p class="text-[9px] opacity-30 font-bold uppercase">Followers</p><p class="text-2xl font-black text-brandBlue">${followersSnap.size}</p></div>
                                <div class="bg-white/5 p-4 rounded-3xl text-center"><p class="text-[9px] opacity-30 font-bold uppercase">Views</p><p class="text-2xl font-black">${totalViews}</p></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 glass p-4 rounded-[2rem]">
                            <button id="btn-create" onclick="switchTeacherView('create')" class="teacher-grid-btn p-4 rounded-xl bg-white/5 text-[9px] font-black uppercase transition-all">Hub Setup</button>
                            <button id="btn-course" onclick="switchTeacherView('course')" class="teacher-grid-btn p-4 rounded-xl bg-white/5 text-[9px] font-black uppercase transition-all">Launch Course</button>
                            <button id="btn-requests" onclick="switchTeacherView('requests')" class="teacher-grid-btn p-4 rounded-xl bg-white/5 text-[9px] font-black uppercase transition-all">Requests</button>
                            <button id="btn-publish" onclick="switchTeacherView('publish')" class="teacher-grid-btn p-4 rounded-xl bg-white/5 text-[9px] font-black uppercase transition-all grid-btn-active">Publish</button>
                        </div>
                        <div id="teacher-action-area" class="glass p-6 rounded-[2rem] space-y-4">
                            <input id="up-t" placeholder="Title" class="input-field text-xs p-3">
                            <input id="up-u" placeholder="Resource System URL" class="input-field text-xs p-3">
                            <select id="up-y" class="input-field text-xs p-3"><option value="video">Recorded Video</option><option value="live">Live Stream</option><option value="file">Asset Material Document</option></select>
                            <button onclick="publishContent()" class="w-full py-3 btn-brand text-xs">Publish Now</button>
                        </div>
                    </div>
                    <div class="lg:col-span-3 space-y-6"><div id="tab-display" class="min-h-[500px]"></div></div>
                </div>`;
                
                const box = document.getElementById('tab-display');
                if (currentTab === 'home') {
                    box.innerHTML = `<h3 class="text-2xl font-black italic mb-6">Creator Insights</h3><div class="grid md:grid-cols-3 gap-6 mb-10"><div class="glass p-8 rounded-[2rem] border border-white/5"><p class="text-[9px] opacity-40 uppercase font-black">Uploads</p><h2 class="text-4xl font-black">${contentSnap.size}</h2></div><div class="glass p-8 rounded-[2rem] border border-white/5"><p class="text-[9px] opacity-40 uppercase font-black">Courses</p><h2 class="text-4xl font-black">${courseSnap.size}</h2></div><div class="glass p-8 rounded-[2rem] border border-white/5"><p class="text-[9px] opacity-40 uppercase font-black">Groups</p><h2 class="text-4xl font-black">${groupSnap.size}</h2></div></div><div id="feed" class="space-y-4"></div>`;
                    renderFeed(structuredContent, true);
                } else if (currentTab === 'groups') {
                    box.innerHTML = `<h3 class="text-2xl font-black italic mb-6">Your Communities</h3><div id="student-groups" class="space-y-4"></div>`;
                    renderGroups(groupSnap.docs, true);
                } else if (currentTab === 'courses') {
                    box.innerHTML = `<h3 class="text-2xl font-black italic mb-6">Course Catalogue Profile</h3><div id="courses-feed" class="grid md:grid-cols-2 gap-6"></div>`;
                    renderCourses(courseSnap.docs, true);
                } else if (currentTab === 'content') {
                    box.innerHTML = `<h3 class="text-2xl font-black italic mb-6">Library Index</h3><div id="feed" class="space-y-4"></div>`;
                    renderFeed(structuredContent, true);
                }
            } else {
                document.getElementById('cart-nav-trigger').classList.remove('hidden');
                main.innerHTML = `<div id="tab-display" class="max-w-4xl mx-auto min-h-[600px]"></div>`;
                const box = document.getElementById('tab-display');
                if (currentTab === 'home') {
                    box.innerHTML = `<h3 class="text-2xl font-black italic mb-6">Suggested Learning Modules</h3><div id="suggested-feed" class="grid md:grid-cols-2 gap-6 mb-10"></div><h3 class="text-2xl font-black italic mb-6">Recent Updates</h3><div id="feed" class="space-y-6"></div>`;
                    const allContent = await Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.limit(6)));
                    renderFeed(allContent.docs, false, 'suggested-feed');
                    if (profile.subs?.length) {
                        const subContent = await Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "in", profile.subs)));
                        const accurateOrder = subContent.docs.sort((a,b) => (b.data().date?.toMillis() || 0) - (a.data().date?.toMillis() || 0));
                        renderFeed(accurateOrder, false, 'feed');
                    }
                } else if (currentTab === 'groups') {

        };

        function trackGroupMessages() {
            Core.onSnapshot(Core.collection(Core.db, "groupMessages"), (snap) => {
                snap.docs.forEach(m => {
                    const data = m.data();
                    const lastRead = localStorage.getItem(`oc_group_read_${data.groupId}`) || 0;
                    if (data.createdAt && data.createdAt.toMillis() > lastRead && data.senderId !== Core.auth.currentUser.uid) {
                        const badgeElement = document.getElementById(`badge-${data.groupId}`);
                        if(badgeElement) badgeElement.classList.remove('hidden');
                    }
                });
            });
        }

        // --- DEEP CONTEXT VERIFIED AI INTEGRATION ---
        window.sendAIMessage = async () => {
            const i = document.getElementById('ai-input'), m = i.value.trim();
            if (!m) return;
            const chat = document.getElementById('ai-messages');
            chat.innerHTML += `<div class="ml-auto bg-brandOrange text-white p-4 rounded-2xl max-w-[80%] text-sm shadow-xl">${m}</div>`;
            i.value = '';
            
            let referenceObjectPrompt = "No active educational media link is currently loaded inside the dashboard frame context view.";
            if (currentVideoContext && currentVideoContext.link) {
                referenceObjectPrompt = `The student is currently watching this resource asset: "${currentVideoContext.title}" directly accessible at YouTube URL link target: ${currentVideoContext.link}`;
            }

            const promptPayload = {
                contents: [{
                    role: "user",
                    parts: [{
                        text: `Context Framework setup tracking: Profile: ${profile?.name}. Rank: ${profile?.role}. Lesson space tracker metadata context: ${referenceObjectPrompt}. 
                        Instruction guidelines: You are the expert automated OpenClass AI copilot assistant. Synthesize concise answers that relate conceptually to the referenced tracking URL context link when questioned about its meaning. Keep answers extremely short and simple.
                        Query command payload text data value: ${m}`
                    }]
                }]
            };

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${aiConfig.geminiKey}`, {
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(promptPayload)
                });
                const data = await res.json();
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    chat.innerHTML += `<div class="bg-white/10 p-4 rounded-2xl max-w-[80%] text-sm shadow-xl border border-white/5">${data.candidates[0].content.parts[0].text}</div>`;
                } else {
                    chat.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl max-w-[80%] text-sm opacity-50">Response packet structural layout anomaly.</div>`;
                }
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { toast("AI response pipeline down", "error"); }
        };

        window.viewTeacher = async (tId) => {
            const main = document.getElementById('main-content');
            const [uS, cS, coS] = await Promise.all([Core.getDocs(Core.query(Core.collection(Core.db, "users"), Core.where("teacherId", "==", tId))), Core.getDocs(Core.query(Core.collection(Core.db, "content"), Core.where("tId", "==", tId))), Core.getDocs(Core.query(Core.collection(Core.db, "courses"), Core.where("teacherId", "==", tId)))]);
            if(uS.empty) return navigate('home');
            const tD = uS.docs[0].data(), isF = profile.subs?.includes(tId);
            main.innerHTML = `<div class="space-y-10"><div class="glass p-10 rounded-[4rem] border border-brandBlue/30 flex flex-col md:flex-row justify-between items-center gap-10 shadow-2xl"><div class="flex items-center gap-8"><img src="${tD.photo || ''}" class="w-24 h-24 rounded-full border-4 border-brandBlue object-cover bg-brandBlue shadow-2xl"><div><h2 class="text-4xl font-black italic tracking-tighter">${tD.name}</h2><p class="text-sm font-bold text-brandBlue uppercase opacity-60">${tD.teacherId}</p></div></div><button onclick="handleSub('${tId}', ${isF})" class="px-10 py-4 ${isF ? 'bg-zinc-800' : 'btn-brand'} rounded-2xl font-black text-xs uppercase">${isF ? 'Unfollow' : 'Follow'}</button></div><h3 class="text-2xl font-black mb-6">Courses</h3><div id="courses-feed" class="grid md:grid-cols-2 gap-6 mb-10"></div><h3 class="text-2xl font-black mb-6">Lessons</h3><div id="feed" class="space-y-4"></div></div>`;
            renderFeed(cS.docs, false); renderCourses(coS.docs);
        };

        window.handleSub = async (tId, isF) => {
            await Core.updateDoc(Core.doc(Core.db, "users", Core.auth.currentUser.uid), { subs: isF ? Core.arrayRemove(tId) : Core.arrayUnion(tId) });
            profile.subs = isF ? profile.subs.filter(i => i !== tId) : [...(profile.subs||[]), tId];
            viewTeacher(tId);
        };

        Core.onAuthStateChanged(Core.auth, async (user) => {
            if (user) {
                const docSnap = await Core.getDoc(Core.doc(Core.db, "users", user.uid));
                if (!docSnap.exists()) showScreen('onboarding-screen');
                else {
                    profile = docSnap.data();
                    const pic = document.getElementById('nav-profile-pic');
                    if (profile.photo) pic.innerHTML = `<img src="${profile.photo}" class="w-full h-full object-cover">`;
                    pic.className = `w-10 h-10 rounded-full border-2 overflow-hidden hidden md:block ${profile.role === 'teacher' ? 'border-brandBlue' : 'border-brandOrange'}`;
                    showScreen('dashboard'); navigate(window.location.hash.substring(1) || 'home');
                }
            } else showScreen('auth-screen');
        });

        window.toggleAIChat = () => document.getElementById('ai-chat-window').classList.toggle('hidden');
        window.closeGroupChat = () => document.getElementById('group-chat-window').classList.add('hidden');
        window.toggleMode = () => { document.documentElement.classList.toggle('light'); localStorage.setItem('oc_theme', document.documentElement.classList.contains('light')); };
        
        window.closeVault = () => { 
            document.getElementById('media-vault').classList.add('hidden'); 
            currentVideoContext = null; 
            if(window._disengageShields) window._disengageShields();
            if(videoPlayer) videoPlayer.destroy(); 
        };
        
        function showScreen(id) { ['auth-screen', 'verify-screen', 'onboarding-screen', 'dashboard'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function toast(m, type = "s") { const b = document.getElementById('toast-box'), d = document.createElement('div'); d.className = 'toast-pill'; if (type === "error") d.style.borderColor = "red"; d.innerText = m; b.appendChild(d); setTimeout(() => d.remove(), 2500); }
        if (localStorage.getItem('oc_theme') === 'true') document.documentElement.classList.add('light');

        async function loadGroups() {
            const container = document.getElementById('student-groups'); if (!container) return;
            const snap = await Core.getDocs(Core.query(Core.collection(Core.db, "groups")));
            container.innerHTML = snap.docs.filter(d => d.data().members?.includes(Core.auth.currentUser.uid) || d.data().teacherId === profile.teacherId).map(docSnap => {
                const g = docSnap.data();
                return `<div class="glass p-6 rounded-[2rem] flex justify-between items-center border border-white/5 hover:border-brandOrange/20 transition-all group relative">
                    <div>
                        <span class="absolute top-4 right-4 w-2 h-2 bg-brandOrange rounded-full hidden" id="badge-${docSnap.id}"></span>
                        <span class="text-[9px] text-brandOrange font-black uppercase tracking-widest">${g.type}</span>
                        <h3 class="text-xl font-black">${g.name}</h3>
                        <p class="text-xs opacity-40">${g.code}</p>
                    </div>
                    <button onclick="openGroupChat('${docSnap.id}', '${g.name}')" class="btn-brand px-6 py-2 text-[10px]">Open Hub</button>
                </div>`;
            }).join('');
        }

        function renderGroups(docs, isT) {
            const container = document.getElementById('student-groups') || document.getElementById('tab-display'); if(!container) return;
            container.innerHTML = `<div class="space-y-4">${docs.map(d => {
                const g = d.data();
                return `<div class="glass p-6 rounded-[2rem] flex justify-between items-center group border border-white/5 hover:border-brandBlue/20 transition-all relative">
                    <div>
                        <span class="absolute top-4 right-4 w-2 h-2 bg-brandOrange rounded-full hidden" id="badge-${d.id}"></span>
                        <span class="text-[9px] text-brandBlue font-black uppercase tracking-widest">${g.type}</span>
                        <h3 class="text-xl font-black">${g.name}</h3>
                        <p class="text-xs opacity-40">${g.code}</p>
                    </div>
                    <div class="flex gap-2"><button onclick="openGroupChat('${d.id}', '${g.name}')" class="btn-brand px-6 py-2 text-[10px]">Manage</button><button onclick="delG('${d.id}')" class="bg-red-500/10 text-red-500 p-2 rounded-xl hover:bg-red-500 hover:text-white transition-all">🗑</button></div>
                </div>`;
            }).join('')}</div>`;
        }
        window.delG = async (id) => { if(confirm("Delete Hub?")) { await Core.deleteDoc(Core.doc(Core.db, "groups", id)); loadHome(); } };
        window.onclick = (e) => { if (e.target === document.getElementById('custom-modal')) document.getElementById('custom-modal').classList.add('hidden'); };
    </script>
</body>
</html>
